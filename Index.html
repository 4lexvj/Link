<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ImmoAlex's - État des Lieux Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
            overscroll-behavior: none;
        }
        canvas { touch-action: none; background: white; }

        @media print {
            @page { size: A4; margin: 1.5cm; }
            body { background: white !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .page-break { page-break-before: always; }
            .card { border: 1px solid #cbd5e1; padding: 12px; margin-bottom: 15px; break-inside: avoid; border-radius: 8px; }
            header { border-bottom: 3px solid #0f172a; margin-bottom: 20px; padding-bottom: 10px; }
            .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
            .photo-item { width: 100%; height: 120px; object-fit: cover; border: 1px solid #e2e8f0; border-radius: 4px; }
            .signature-box { border: 1px solid #cbd5e1; height: 120px; padding: 10px; text-align: center; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        attrs: { strokeWidth: 2, width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <i data-lucide={name} ref={iconRef} className="inline-block"></i>;
        };

        // Composant de signature réutilisable
        const SignaturePad = ({ label, onSave, savedImage }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [hasContent, setHasContent] = useState(false);

            useEffect(() => {
                if (savedImage || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.strokeStyle = '#0f172a';
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                
                const getPos = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    return { x: clientX - rect.left, y: clientY - rect.top };
                };
                const start = (e) => { setIsDrawing(true); setHasContent(true); const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); };
                const move = (e) => { if (!isDrawing) return; e.preventDefault(); const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); };
                const stop = () => setIsDrawing(false);

                canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
                canvas.addEventListener('touchstart', start, {passive: false}); canvas.addEventListener('touchmove', move, {passive: false}); canvas.addEventListener('touchend', stop);
                return () => {
                    canvas.removeEventListener('mousedown', start); canvas.removeEventListener('mousemove', move); window.removeEventListener('mouseup', stop);
                    canvas.removeEventListener('touchstart', start); canvas.removeEventListener('touchmove', move); canvas.removeEventListener('touchend', stop);
                };
            }, [isDrawing, savedImage]);

            if (savedImage) {
                return (
                    <div className="bg-white p-4 rounded-3xl border-2 border-emerald-100 shadow-sm relative group">
                        <p className="text-[10px] font-black text-emerald-600 uppercase mb-2 tracking-widest">{label} - SIGNÉ</p>
                        <img src={savedImage} className="h-32 w-full object-contain mx-auto" />
                        <button onClick={() => onSave(null)} className="absolute top-2 right-2 p-2 bg-slate-100 rounded-full text-slate-400">
                            <Icon name="rotate-ccw" size={14} />
                        </button>
                    </div>
                );
            }

            return (
                <div className="space-y-3">
                    <p className="text-xs font-bold text-slate-500 uppercase tracking-wider text-left pl-2">{label}</p>
                    <div className="bg-white border-2 border-slate-200 rounded-3xl overflow-hidden shadow-inner relative h-48">
                        <canvas ref={canvasRef} width={400} height={200} className="w-full h-full cursor-crosshair" />
                        <div className="absolute bottom-4 left-0 right-0 pointer-events-none text-center">
                            <span className="text-[9px] text-slate-300 font-bold uppercase tracking-tighter italic">Signature {label} ici</span>
                        </div>
                    </div>
                    <div className="flex gap-2">
                        <button onClick={() => {
                            const ctx = canvasRef.current.getContext('2d');
                            ctx.clearRect(0,0,canvasRef.current.width,canvasRef.current.height);
                            setHasContent(false);
                        }} className="px-4 py-2 text-[10px] font-bold text-slate-400 uppercase">Effacer</button>
                        <button onClick={() => hasContent && onSave(canvasRef.current.toDataURL())} 
                                className={`flex-1 py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all ${hasContent ? 'bg-slate-900 text-white shadow-lg' : 'bg-slate-100 text-slate-300 cursor-not-allowed'}`}>
                            Valider Signature
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [step, setStep] = useState(1);
            const fileInputRef = useRef(null);
            const [activeTarget, setActiveTarget] = useState(null);
            
            const [formData, setFormData] = useState(() => {
                const saved = localStorage.getItem('immo_alex_v2');
                return saved ? JSON.parse(saved) : {
                    property: { address: '', owner: '', tenant: '' },
                    rooms: [{ id: 1, name: 'Entrée', elements: [{ id: 101, label: 'Porte d\'entrée', status: 'Bon', photos: [], comment: '' }] }],
                    signatures: { owner: null, tenant: null }
                };
            });

            useEffect(() => {
                localStorage.setItem('immo_alex_v2', JSON.stringify(formData));
                if (window.lucide) window.lucide.createIcons();
            }, [formData, step]);

            const handlePhoto = (e) => {
                const file = e.target.files[0];
                if (!file || !activeTarget) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    const newRooms = formData.rooms.map(r => r.id === activeTarget.roomId ? {
                        ...r, elements: r.elements.map(el => el.id === activeTarget.elementId ? {
                            ...el, photos: [...el.photos, reader.result]
                        } : el)
                    } : r);
                    setFormData({...formData, rooms: newRooms});
                };
                reader.readAsDataURL(file);
            };

            return (
                <div className="min-h-screen flex flex-col items-center pb-32">
                    <input type="file" accept="image/*" capture="environment" ref={fileInputRef} onChange={handlePhoto} className="hidden" />
                    
                    <div className="w-full max-w-lg bg-white min-h-screen flex flex-col shadow-2xl relative main-container overflow-hidden">
                        
                        {/* HEADER */}
                        <header className="bg-slate-900 p-6 text-white sticky top-0 z-20 flex justify-between items-center shadow-xl">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-lg"><Icon name="home" size={20} /></div>
                                <div>
                                    <h1 className="text-lg font-black tracking-tighter uppercase leading-none">ImmoAlex's</h1>
                                    <span className="text-[9px] text-blue-400 font-bold uppercase tracking-[0.2em]">Expertise Immobilière</span>
                                </div>
                            </div>
                            <div className="print-only text-slate-900 text-right">
                                <p className="font-bold text-sm">RAPPORT D'ÉTAT DES LIEUX</p>
                                <p className="text-[10px]">{new Date().toLocaleDateString('fr-FR')}</p>
                            </div>
                            <div className="no-print bg-slate-800 px-3 py-1 rounded-full text-[10px] font-bold text-slate-400">
                                ÉTAPE {step}/4
                            </div>
                        </header>

                        {/* VUE IMPRESSION PDF */}
                        <div className="print-only p-10 space-y-8">
                            <div className="grid grid-cols-2 gap-4 border-b-2 border-slate-900 pb-6">
                                <div>
                                    <h2 className="text-[10px] font-black text-blue-600 uppercase mb-2 underline">Informations Bien</h2>
                                    <p className="text-sm font-bold">{formData.property.address || 'Non spécifiée'}</p>
                                </div>
                                <div>
                                    <h2 className="text-[10px] font-black text-blue-600 uppercase mb-2 underline">Parties</h2>
                                    <p className="text-xs"><strong>Bailleur:</strong> {formData.property.owner || 'N/A'}</p>
                                    <p className="text-xs"><strong>Locataire:</strong> {formData.property.tenant || 'N/A'}</p>
                                </div>
                            </div>

                            {formData.rooms.map(room => (
                                <div key={room.id} className="page-break pt-4">
                                    <h3 className="text-sm font-black bg-slate-900 text-white px-3 py-1.5 rounded inline-block mb-4">{room.name.toUpperCase()}</h3>
                                    {room.elements.map(el => (
                                        <div key={el.id} className="card">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="font-bold text-xs uppercase">{el.label}</span>
                                                <span className={`text-[10px] font-black px-2 py-0.5 rounded ${el.status === 'Neuf' ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700'}`}>ÉTRAT : {el.status.toUpperCase()}</span>
                                            </div>
                                            {el.comment && <p className="text-[10px] italic text-slate-500 mb-2">Note: {el.comment}</p>}
                                            <div className="photo-grid">
                                                {el.photos.map((p, i) => <img key={i} src={p} className="photo-item" />)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ))}

                            <div className="page-break pt-10">
                                <h3 className="font-black text-sm uppercase mb-6 border-b pb-2">Clôture et Signatures</h3>
                                <div className="grid grid-cols-2 gap-8">
                                    <div className="signature-box flex flex-col justify-between">
                                        <span className="text-[9px] font-bold text-slate-400 uppercase">Signature Bailleur</span>
                                        {formData.signatures.owner && <img src={formData.signatures.owner} className="max-h-20 object-contain mx-auto" />}
                                        <p className="text-[10px] font-bold mt-2">{formData.property.owner}</p>
                                    </div>
                                    <div className="signature-box flex flex-col justify-between">
                                        <span className="text-[9px] font-bold text-slate-400 uppercase">Signature Locataire</span>
                                        {formData.signatures.tenant && <img src={formData.signatures.tenant} className="max-h-20 object-contain mx-auto" />}
                                        <p className="text-[10px] font-bold mt-2">{formData.property.tenant}</p>
                                    </div>
                                </div>
                                <p className="text-[8px] text-slate-400 mt-20 text-center uppercase tracking-widest italic">Document généré via ImmoAlex's - État des Lieux Numérique</p>
                            </div>
                        </div>

                        {/* INTERFACE APP MOBILE */}
                        <main className="flex-1 p-6 no-print">
                            {step === 1 && (
                                <div className="space-y-6">
                                    <h2 className="text-xl font-black text-slate-800 uppercase tracking-tighter">Informations du Bien</h2>
                                    <div className="space-y-5">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">Localisation</label>
                                            <input className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-500 outline-none transition-all" placeholder="Adresse complète" value={formData.property.address} onChange={e => setFormData({...formData, property: {...formData.property, address: e.target.value}})} />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">Propriétaire / Bailleur</label>
                                            <input className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-500 outline-none transition-all" placeholder="Nom du bailleur" value={formData.property.owner} onChange={e => setFormData({...formData, property: {...formData.property, owner: e.target.value}})} />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">Locataire(s)</label>
                                            <input className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-500 outline-none transition-all" placeholder="Nom du locataire entrant" value={formData.property.tenant} onChange={e => setFormData({...formData, property: {...formData.property, tenant: e.target.value}})} />
                                        </div>
                                    </div>
                                </div>
                            )}

                            {step === 2 && (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center py-2 sticky top-[72px] bg-white/80 backdrop-blur-md z-10">
                                        <h2 className="text-xl font-black text-slate-800 uppercase tracking-tighter">Inventaire Pièces</h2>
                                        <button onClick={() => setFormData({...formData, rooms: [...formData.rooms, {id: Date.now(), name: 'Nouvelle pièce', elements: []}]})} className="bg-slate-900 text-white p-3 rounded-2xl shadow-lg active:scale-95 transition-all"><Icon name="plus" size={20} /></button>
                                    </div>
                                    
                                    {formData.rooms.map(room => (
                                        <div key={room.id} className="bg-slate-50 p-5 rounded-[2.5rem] border border-slate-200 mb-8">
                                            <input className="font-black text-slate-900 bg-transparent outline-none w-full text-lg uppercase mb-4" value={room.name} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, name: e.target.value} : r)})} />
                                            <div className="space-y-5">
                                                {room.elements.map(el => (
                                                    <div key={el.id} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                                        <input className="w-full font-black text-slate-700 outline-none mb-3 text-sm" value={el.label} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, label: e.target.value} : e2)} : r)})} />
                                                        <div className="flex gap-1.5 mb-4">
                                                            {['Neuf', 'Bon', 'Moyen', 'Mauvais'].map(s => (
                                                                <button key={s} onClick={() => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, status: s} : e2)} : r)})} className={`flex-1 py-2.5 rounded-xl text-[9px] font-black border-2 transition-all ${el.status === s ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-300 border-slate-50'}`}>{s.toUpperCase()}</button>
                                                            ))}
                                                        </div>
                                                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                                            <button onClick={() => { setActiveTarget({roomId: room.id, elementId: el.id}); fileInputRef.current.click(); }} className="w-16 h-16 shrink-0 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-center text-slate-400 active:bg-blue-50 active:text-blue-600 active:border-blue-200 transition-all"><Icon name="camera" size={24} /></button>
                                                            {el.photos.map((p, i) => <img key={i} src={p} className="w-16 h-16 object-cover rounded-2xl border-2 border-white shadow-sm" />)}
                                                        </div>
                                                    </div>
                                                ))}
                                                <button onClick={() => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: [...r.elements, {id: Date.now(), label: 'Élément...', status: 'Bon', photos: [], comment: ''}]} : r)})} className="w-full py-3 text-[10px] font-black text-slate-400 border-2 border-dashed border-slate-200 rounded-2xl uppercase tracking-widest">+ Ajouter un élément</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {step === 3 && (
                                <div className="space-y-8 animate-in pb-10">
                                    <div className="text-center space-y-2">
                                        <h2 className="text-xl font-black text-slate-800 uppercase tracking-tighter">Signatures des Parties</h2>
                                        <p className="text-xs text-slate-400">Le document doit être signé par le bailleur et le locataire.</p>
                                    </div>

                                    <div className="space-y-10">
                                        {/* Signature Bailleur */}
                                        <SignaturePad 
                                            label="Bailleur / Propriétaire" 
                                            onSave={(img) => setFormData({...formData, signatures: {...formData.signatures, owner: img}})}
                                            savedImage={formData.signatures.owner}
                                        />

                                        {/* Signature Locataire */}
                                        <SignaturePad 
                                            label="Locataire" 
                                            onSave={(img) => setFormData({...formData, signatures: {...formData.signatures, tenant: img}})}
                                            savedImage={formData.signatures.tenant}
                                        />
                                    </div>
                                </div>
                            )}

                            {step === 4 && (
                                <div className="space-y-8 text-center animate-in">
                                    <div className="w-24 h-24 bg-emerald-500 rounded-[2.5rem] flex items-center justify-center text-white mx-auto shadow-2xl shadow-emerald-200 rotate-3 animate-bounce">
                                        <Icon name="check" size={48} />
                                    </div>
                                    <div className="space-y-2">
                                        <h2 className="text-2xl font-black text-slate-900 uppercase tracking-tighter">Dossier Complet</h2>
                                        <p className="text-sm text-slate-400 px-6">L'état des lieux est prêt pour l'exportation en format PDF officiel.</p>
                                    </div>

                                    <div className="bg-slate-900 p-8 rounded-[3rem] text-left text-white shadow-2xl space-y-4">
                                        <div className="flex justify-between items-center border-b border-slate-800 pb-3">
                                            <span className="text-[10px] font-black text-blue-400 uppercase">Bien</span>
                                            <span className="text-xs font-bold truncate max-w-[200px]">{formData.property.address || 'Non spécifiée'}</span>
                                        </div>
                                        <div className="flex justify-between items-center border-b border-slate-800 pb-3">
                                            <span className="text-[10px] font-black text-blue-400 uppercase">Signatures</span>
                                            <div className="flex gap-2">
                                                <span className={`text-[10px] font-black px-2 py-0.5 rounded ${formData.signatures.owner ? 'bg-emerald-500' : 'bg-red-500'}`}>Bailleur</span>
                                                <span className={`text-[10px] font-black px-2 py-0.5 rounded ${formData.signatures.tenant ? 'bg-emerald-500' : 'bg-red-500'}`}>Locataire</span>
                                            </div>
                                        </div>
                                        <button onClick={() => window.print()} className="w-full py-5 bg-blue-600 rounded-2xl font-black text-sm uppercase flex items-center justify-center gap-3 active:scale-95 transition-all shadow-lg shadow-blue-500/20">
                                            <Icon name="file-text" size={20} /> Générer Rapport PDF
                                        </button>
                                    </div>
                                    
                                    <p className="text-[10px] text-slate-400 font-bold italic uppercase">Sélectionnez "Enregistrer au format PDF" dans les options d'impression de votre iPad.</p>
                                </div>
                            )}
                        </main>

                        {/* NAV FOOTER */}
                        <footer className="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex justify-between gap-4 z-30 max-w-lg mx-auto rounded-t-[3rem] no-print">
                            {step > 1 && (
                                <button onClick={() => setStep(s => s - 1)} className="p-6 rounded-3xl bg-slate-50 text-slate-400 active:bg-slate-100 transition-colors">
                                    <Icon name="arrow-left" size={24} />
                                </button>
                            )}
                            {step < 4 && (
                                <button onClick={() => setStep(s => s + 1)} className="flex-1 py-6 rounded-3xl bg-slate-900 text-white font-black text-xs uppercase tracking-widest flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all">
                                    {step === 3 ? 'Finaliser le Dossier' : 'Étape Suivante'} <Icon name="chevron-right" size={20} />
                                </button>
                            )}
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

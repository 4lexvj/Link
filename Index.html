<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Immo-Alex - Drumettaz-Clarafond</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
            overscroll-behavior: none;
        }
        canvas { touch-action: none; background: white; }

        @media print {
            @page { size: A4; margin: 1.5cm; }
            body { background: white !important; -webkit-print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .page-break { page-break-before: always; }
            .card { border: 1px solid #cbd5e1; padding: 12px; margin-bottom: 15px; break-inside: avoid; border-radius: 8px; }
            header { border-bottom: 3px solid #0f172a; margin-bottom: 20px; padding-bottom: 10px; }
            .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
            .photo-item { width: 100%; height: 120px; object-fit: cover; border: 1px solid #e2e8f0; border-radius: 4px; }
            .signature-box { border: 1px solid #cbd5e1; height: 140px; padding: 10px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        attrs: { strokeWidth: 2, width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <i data-lucide={name} ref={iconRef} className="inline-block"></i>;
        };

        const SignaturePad = ({ label, onSave, savedImage }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [hasContent, setHasContent] = useState(false);

            useEffect(() => {
                if (savedImage || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.strokeStyle = '#0f172a';
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                
                const getPos = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    return { x: clientX - rect.left, y: clientY - rect.top };
                };
                const start = (e) => { setIsDrawing(true); setHasContent(true); const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); };
                const move = (e) => { if (!isDrawing) return; e.preventDefault(); const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); };
                const stop = () => setIsDrawing(false);

                canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
                canvas.addEventListener('touchstart', start, {passive: false}); canvas.addEventListener('touchmove', move, {passive: false}); canvas.addEventListener('touchend', stop);
                return () => {
                    canvas.removeEventListener('mousedown', start); canvas.removeEventListener('mousemove', move); window.removeEventListener('mouseup', stop);
                    canvas.removeEventListener('touchstart', start); canvas.removeEventListener('touchmove', move); canvas.removeEventListener('touchend', stop);
                };
            }, [isDrawing, savedImage]);

            if (savedImage) {
                return (
                    <div className="bg-white p-4 rounded-3xl border-2 border-emerald-100 shadow-sm relative">
                        <p className="text-[10px] font-black text-emerald-600 uppercase mb-2 tracking-widest">{label} - SIGNÉ</p>
                        <img src={savedImage} className="h-32 w-full object-contain mx-auto" />
                        <button onClick={() => onSave(null)} className="absolute top-2 right-2 p-2 bg-slate-100 rounded-full text-slate-400">
                            <Icon name="rotate-ccw" size={14} />
                        </button>
                    </div>
                );
            }

            return (
                <div className="space-y-3">
                    <p className="text-xs font-bold text-slate-500 uppercase tracking-wider text-left pl-2">{label}</p>
                    <div className="bg-white border-2 border-slate-200 rounded-3xl overflow-hidden shadow-inner relative h-48">
                        <canvas ref={canvasRef} width={400} height={200} className="w-full h-full cursor-crosshair" />
                        <div className="absolute bottom-4 left-0 right-0 pointer-events-none text-center">
                            <span className="text-[9px] text-slate-300 font-bold uppercase tracking-tighter italic">Signez ici</span>
                        </div>
                    </div>
                    <div className="flex gap-2">
                        <button onClick={() => {
                            const ctx = canvasRef.current.getContext('2d');
                            ctx.clearRect(0,0,canvasRef.current.width,canvasRef.current.height);
                            setHasContent(false);
                        }} className="px-4 py-2 text-[10px] font-bold text-slate-400 uppercase">Effacer</button>
                        <button onClick={() => hasContent && onSave(canvasRef.current.toDataURL())} 
                                className={`flex-1 py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all ${hasContent ? 'bg-slate-900 text-white shadow-lg' : 'bg-slate-100 text-slate-300 cursor-not-allowed'}`}>
                            Valider
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [step, setStep] = useState(1);
            const fileInputRef = useRef(null);
            const [activeTarget, setActiveTarget] = useState(null);
            
            const [formData, setFormData] = useState(() => {
                const saved = localStorage.getItem('immo_alex_drumettaz_v3');
                return saved ? JSON.parse(saved) : {
                    property: { address: 'Drumettaz-Clarafond', owner: '', tenant: '' },
                    rooms: [{ id: 1, name: 'Séjour', elements: [{ id: 101, label: 'Murs et Plafonds', status: 'Bon', photos: [], comment: '' }] }],
                    signatures: { owner: null, tenant: null }
                };
            });

            useEffect(() => {
                localStorage.setItem('immo_alex_drumettaz_v3', JSON.stringify(formData));
                if (window.lucide) window.lucide.createIcons();
            }, [formData, step]);

            const handlePhoto = (e) => {
                const file = e.target.files[0];
                if (!file || !activeTarget) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    const newRooms = formData.rooms.map(r => r.id === activeTarget.roomId ? {
                        ...r, elements: r.elements.map(el => el.id === activeTarget.elementId ? {
                            ...el, photos: [...el.photos, reader.result]
                        } : el)
                    } : r);
                    setFormData({...formData, rooms: newRooms});
                };
                reader.readAsDataURL(file);
            };

            return (
                <div className="min-h-screen flex flex-col items-center pb-32">
                    <input type="file" accept="image/*" capture="environment" ref={fileInputRef} onChange={handlePhoto} className="hidden" />
                    
                    <div className="w-full max-w-lg bg-white min-h-screen flex flex-col shadow-2xl relative main-container overflow-hidden">
                        
                        {/* Header */}
                        <header className="bg-slate-900 p-6 text-white sticky top-0 z-20 flex justify-between items-center shadow-xl">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-lg"><Icon name="home" size={20} /></div>
                                <div>
                                    <h1 className="text-lg font-black tracking-tighter uppercase leading-none">Immo-Alex's</h1>
                                    <span className="text-[9px] text-blue-400 font-bold uppercase tracking-[0.1em]">Appartement Drumettaz-Clarafond</span>
                                </div>
                            </div>
                            <div className="no-print bg-slate-800 px-3 py-1 rounded-full text-[10px] font-bold text-slate-400">
                                {step}/4
                            </div>
                        </header>

                        {/* PDF Content */}
                        <div className="print-only p-10 space-y-8">
                            <div className="border-b-2 border-slate-900 pb-6">
                                <h2 className="text-[10px] font-black text-blue-600 uppercase mb-1">ÉTAT DES LIEUX DE SORTIE / ENTRÉE</h2>
                                <p className="text-xl font-black">Appartement Drumettaz-Clarafond</p>
                                <p className="text-sm text-slate-500 mt-2">{formData.property.address}</p>
                            </div>

                            <div className="grid grid-cols-2 gap-8 text-xs bg-slate-50 p-4 rounded-xl">
                                <div>
                                    <p className="font-black text-blue-600 uppercase text-[9px] mb-1">Bailleur</p>
                                    <p className="font-bold">{formData.property.owner || '—'}</p>
                                </div>
                                <div>
                                    <p className="font-black text-blue-600 uppercase text-[9px] mb-1">Locataire</p>
                                    <p className="font-bold">{formData.property.tenant || '—'}</p>
                                </div>
                            </div>

                            {formData.rooms.map(room => (
                                <div key={room.id} className="page-break pt-4">
                                    <h3 className="text-sm font-black bg-slate-900 text-white px-3 py-1.5 rounded inline-block mb-4 uppercase">{room.name}</h3>
                                    {room.elements.map(el => (
                                        <div key={el.id} className="card">
                                            <div className="flex justify-between items-center mb-2 border-b pb-1">
                                                <span className="font-bold text-xs uppercase">{el.label}</span>
                                                <span className="text-[10px] font-black px-2 py-0.5 rounded bg-blue-100 text-blue-700 uppercase">État : {el.status}</span>
                                            </div>
                                            <div className="photo-grid">
                                                {el.photos.map((p, i) => <img key={i} src={p} className="photo-item" />)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ))}

                            <div className="page-break pt-10">
                                <h3 className="text-xs font-black uppercase mb-4 border-b pb-2 text-blue-600">Signatures certifiées</h3>
                                <div className="grid grid-cols-2 gap-8">
                                    <div className="signature-box">
                                        <span className="text-[9px] font-bold text-slate-400 uppercase">Signature du Bailleur</span>
                                        {formData.signatures.owner && <img src={formData.signatures.owner} className="max-h-24 object-contain mx-auto" />}
                                        <p className="text-[10px] font-bold mt-2 uppercase">{formData.property.owner}</p>
                                    </div>
                                    <div className="signature-box">
                                        <span className="text-[9px] font-bold text-slate-400 uppercase">Signature du Locataire</span>
                                        {formData.signatures.tenant && <img src={formData.signatures.tenant} className="max-h-24 object-contain mx-auto" />}
                                        <p className="text-[10px] font-bold mt-2 uppercase">{formData.property.tenant}</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* UI Sections */}
                        <main className="flex-1 p-6 no-print">
                            {step === 1 && (
                                <div className="space-y-6">
                                    <h2 className="text-xl font-black text-slate-800 uppercase tracking-tighter">1. Coordonnées</h2>
                                    <div className="space-y-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Propriétaire / Bailleur</label>
                                            <input className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-500 outline-none" placeholder="Nom complet" value={formData.property.owner} onChange={e => setFormData({...formData, property: {...formData.property, owner: e.target.value}})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Locataire</label>
                                            <input className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-500 outline-none" placeholder="Nom complet" value={formData.property.tenant} onChange={e => setFormData({...formData, property: {...formData.property, tenant: e.target.value}})} />
                                        </div>
                                    </div>
                                </div>
                            )}

                            {step === 2 && (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-xl font-black text-slate-800 uppercase tracking-tighter">2. Inventaire</h2>
                                        <button onClick={() => setFormData({...formData, rooms: [...formData.rooms, {id: Date.now(), name: 'Nouvelle pièce', elements: []}]})} className="bg-slate-900 text-white p-3 rounded-2xl shadow-lg"><Icon name="plus" size={20} /></button>
                                    </div>
                                    {formData.rooms.map(room => (
                                        <div key={room.id} className="bg-slate-50 p-5 rounded-[2.5rem] border border-slate-200 mb-6">
                                            <input className="font-black text-slate-900 bg-transparent outline-none w-full text-lg uppercase mb-4" value={room.name} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, name: e.target.value} : r)})} />
                                            <div className="space-y-4">
                                                {room.elements.map(el => (
                                                    <div key={el.id} className="bg-white p-4 rounded-3xl shadow-sm">
                                                        <input className="w-full font-bold text-slate-700 outline-none mb-2" value={el.label} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, label: e.target.value} : e2)} : r)})} />
                                                        <div className="flex gap-2 mb-3">
                                                            {['Neuf', 'Bon', 'Moyen', 'Mauvais'].map(s => (
                                                                <button key={s} onClick={() => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, status: s} : e2)} : r)})} className={`flex-1 py-2 rounded-xl text-[8px] font-black border-2 transition-all ${el.status === s ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-300 border-slate-50'}`}>{s.toUpperCase()}</button>
                                                            ))}
                                                        </div>
                                                        <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                                            <button onClick={() => { setActiveTarget({roomId: room.id, elementId: el.id}); fileInputRef.current.click(); }} className="w-14 h-14 shrink-0 bg-slate-50 border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center text-slate-400"><Icon name="camera" size={24} /></button>
                                                            {el.photos.map((p, i) => <img key={i} src={p} className="w-14 h-14 object-cover rounded-xl border-2 border-white" />)}
                                                        </div>
                                                    </div>
                                                ))}
                                                <button onClick={() => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: [...r.elements, {id: Date.now(), label: 'Élément...', status: 'Bon', photos: [], comment: ''}]} : r)})} className="w-full py-2 text-[10px] font-black text-slate-400 border-2 border-dashed border-slate-200 rounded-xl uppercase">+ Ajouter un élément</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {step === 3 && (
                                <div className="space-y-8 pb-10">
                                    <h2 className="text-xl font-black text-center uppercase tracking-tighter">3. Signatures</h2>
                                    <div className="space-y-10">
                                        <SignaturePad 
                                            label="Signature du Bailleur" 
                                            onSave={(img) => setFormData({...formData, signatures: {...formData.signatures, owner: img}})}
                                            savedImage={formData.signatures.owner}
                                        />
                                        <SignaturePad 
                                            label="Signature du Locataire" 
                                            onSave={(img) => setFormData({...formData, signatures: {...formData.signatures, tenant: img}})}
                                            savedImage={formData.signatures.tenant}
                                        />
                                    </div>
                                </div>
                            )}

                            {step === 4 && (
                                <div className="space-y-8 text-center py-10">
                                    <div className="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center text-white mx-auto shadow-2xl"><Icon name="check" size={40} /></div>
                                    <div className="space-y-2">
                                        <h2 className="text-2xl font-black uppercase tracking-tighter">Terminé</h2>
                                        <p className="text-sm text-slate-400 px-10">Votre état des lieux est complet et signé par les deux parties.</p>
                                    </div>
                                    <button onClick={() => window.print()} className="w-full py-6 bg-slate-900 text-white rounded-[1.5rem] font-black flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all">
                                        <Icon name="file-text" size={24} /> GÉNÉRER LE PDF FINAL
                                    </button>
                                </div>
                            )}
                        </main>

                        {/* Footer Nav */}
                        <footer className="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex justify-between gap-4 z-30 max-w-lg mx-auto rounded-t-[2.5rem] no-print">
                            {step > 1 && (
                                <button onClick={() => setStep(s => s - 1)} className="p-6 rounded-3xl bg-slate-50 text-slate-400 active:bg-slate-100 transition-all"><Icon name="arrow-left" size={24} /></button>
                            )}
                            {step < 4 && (
                                <button onClick={() => setStep(s => s + 1)} className="flex-1 py-6 rounded-3xl bg-slate-900 text-white font-black flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all uppercase tracking-widest text-xs">
                                    {step === 3 ? 'Finaliser' : 'Suivant'} <Icon name="chevron-right" size={20} />
                                </button>
                            )}
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

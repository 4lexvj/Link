<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Immo-Alex's - État des Lieux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F8FAFC; margin: 0; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
        .print-only { display: none; }
        .signature-canvas { touch-action: none; cursor: crosshair; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .lucide-icon-wrapper { display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuration Firebase simulée pour l'exemple
        const appId = window.__app_id || 'immo-alexs-app';

        // Composant Icône sécurisé contre les erreurs removeChild
        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && window.lucide.createIcons) {
                    window.lucide.createIcons({
                        attrs: {
                            class: `lucide lucide-${name} ${className}`,
                            style: `width: ${size}px; height: ${size}px; stroke-width: 2.5px;`
                        },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);
            return (
                <span className="lucide-icon-wrapper">
                    <i data-lucide={name} style={{ width: size, height: size }}></i>
                </span>
            );
        };

        const SignatureBox = ({ label, onSave, savedImage }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                if (savedImage || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 3; ctx.lineCap = 'round';
                
                const getPos = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const t = e.touches ? e.touches[0] : e;
                    return { 
                        x: (t.clientX - rect.left) * (canvas.width / rect.width), 
                        y: (t.clientY - rect.top) * (canvas.height / rect.height) 
                    };
                };

                const start = (e) => { setIsDrawing(true); const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
                const move = (e) => { if (!isDrawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
                const stop = () => setIsDrawing(false);

                canvas.addEventListener('mousedown', start);
                canvas.addEventListener('mousemove', move);
                window.addEventListener('mouseup', stop);
                canvas.addEventListener('touchstart', start, { passive: false });
                canvas.addEventListener('touchmove', move, { passive: false });
                canvas.addEventListener('touchend', stop);

                return () => {
                    canvas.removeEventListener('mousedown', start);
                    canvas.removeEventListener('mousemove', move);
                    window.removeEventListener('mouseup', stop);
                };
            }, [isDrawing, savedImage]);

            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center px-2">
                        <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">{label}</span>
                        {savedImage && (
                            <button onClick={() => onSave(null)} className="text-rose-500 text-[10px] font-bold uppercase flex items-center gap-1">
                                <Icon name="rotate-ccw" size={12}/> Effacer
                            </button>
                        )}
                    </div>
                    <div className="h-44 bg-white rounded-[2rem] border border-slate-100 shadow-inner relative overflow-hidden">
                        {savedImage ? (
                            <img src={savedImage} className="w-full h-full object-contain p-6" />
                        ) : (
                            <>
                                <canvas ref={canvasRef} width={600} height={300} className="w-full h-full signature-canvas" />
                                <button 
                                    onClick={() => onSave(canvasRef.current.toDataURL())} 
                                    className="absolute bottom-4 right-4 bg-slate-900 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest shadow-xl active:scale-95 transition-transform"
                                >
                                    Valider
                                </button>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        function App() {
            const [step, setStep] = useState(1);
            const [isProcessing, setIsProcessing] = useState(false);
            const [activeTarget, setActiveTarget] = useState(null);
            const fileInputRef = useRef(null);

            const [formData, setFormData] = useState({
                property: { address: 'Drumettaz-Clarafond', owner: '', tenant: '', date: new Date().toLocaleDateString('fr-FR') },
                rooms: [{ id: 1, name: 'Entrée', elements: [{ id: 101, label: 'Porte', status: 'B', comment: '', photos: [] }] }],
                signatures: { owner: null, tenant: null }
            });

            const handleShare = async () => {
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: `État des Lieux - ${formData.property.address}`,
                            text: `Rapport Immo-Alex's du ${formData.property.date} pour ${formData.property.tenant || 'le locataire'}.`,
                            url: window.location.href
                        });
                    } catch (err) {
                        console.log("Erreur de partage:", err);
                    }
                } else {
                    window.print();
                }
            };

            const handlePhoto = async (e) => {
                const file = e.target.files[0];
                if (!file || !activeTarget) return;
                setIsProcessing(true);
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1000;
                        let w = img.width, h = img.height;
                        if (w > MAX_WIDTH) { h *= MAX_WIDTH / w; w = MAX_WIDTH; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        const base64 = canvas.toDataURL('image/jpeg', 0.6);
                        
                        setFormData(prev => ({
                            ...prev,
                            rooms: prev.rooms.map(r => r.id === activeTarget.roomId ? {
                                ...r, elements: r.elements.map(el => el.id === activeTarget.elId ? { 
                                    ...el, photos: [...(el.photos || []), base64] 
                                } : el)
                            } : r)
                        }));
                        setIsProcessing(false);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            return (
                <div className="min-h-screen pb-40">
                    <input type="file" ref={fileInputRef} className="hidden" accept="image/*" capture="environment" onChange={handlePhoto} />
                    
                    <header className="fixed top-0 inset-x-0 h-20 bg-white/90 backdrop-blur-xl z-[100] border-b border-slate-100 flex items-center justify-between px-6 no-print">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-xl rotate-3">
                                <Icon name="home" size={18}/>
                            </div>
                            <div>
                                <h1 className="text-[11px] font-black uppercase tracking-tight italic leading-tight text-slate-900">Immo-Alex's</h1>
                                <span className="text-[8px] font-bold uppercase text-slate-400 block tracking-widest">{formData.property.date}</span>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={handleShare} className="w-10 h-10 bg-slate-50 text-slate-400 rounded-full flex items-center justify-center active:scale-95 transition-transform">
                                <Icon name="share-2" size={18}/>
                            </button>
                            <button onClick={() => window.print()} className="w-10 h-10 bg-slate-50 text-slate-400 rounded-full flex items-center justify-center active:scale-95 transition-transform">
                                <Icon name="printer" size={18}/>
                            </button>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto pt-28 px-6 no-print space-y-10">
                        {step === 1 && (
                            <div className="space-y-8 animate-in">
                                <h2 className="text-5xl font-black italic tracking-tighter uppercase leading-none text-slate-900">Le Bien</h2>
                                <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest px-2">Localisation du logement</label>
                                        <input className="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none border border-transparent focus:border-slate-200" value={formData.property.address} onChange={e => setFormData({...formData, property: {...formData.property, address: e.target.value}})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest px-2">Propriétaire</label>
                                            <input className="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none border border-transparent focus:border-slate-200" placeholder="Nom..." value={formData.property.owner} onChange={e => setFormData({...formData, property: {...formData.property, owner: e.target.value}})} />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest px-2">Locataire</label>
                                            <input className="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none border border-transparent focus:border-slate-200" placeholder="Nom..." value={formData.property.tenant} onChange={e => setFormData({...formData, property: {...formData.property, tenant: e.target.value}})} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="space-y-8 animate-in">
                                <div className="flex justify-between items-end">
                                    <h2 className="text-5xl font-black italic tracking-tighter uppercase leading-none text-slate-900">Visite</h2>
                                    <button onClick={() => setFormData({...formData, rooms: [...formData.rooms, { id: Date.now(), name: 'Nouvelle Pièce', elements: [] }]})} className="bg-slate-900 text-white p-4 rounded-2xl shadow-xl active:scale-95 transition-transform">
                                        <Icon name="plus" size={24}/>
                                    </button>
                                </div>

                                {formData.rooms.map(room => (
                                    <div key={room.id} className="bg-white rounded-[2.5rem] border border-slate-100 overflow-hidden mb-8 shadow-sm">
                                        <div className="p-6 bg-slate-50/50 flex justify-between items-center border-b border-slate-50">
                                            <input className="bg-transparent font-black text-xl uppercase outline-none text-slate-900 flex-1" value={room.name} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, name: e.target.value} : r)})} />
                                            <button onClick={() => setFormData({...formData, rooms: formData.rooms.filter(r => r.id !== room.id)})} className="text-slate-300 hover:text-rose-500 transition-colors">
                                                <Icon name="trash-2" size={18}/>
                                            </button>
                                        </div>
                                        <div className="p-6 space-y-6">
                                            {room.elements.map(el => (
                                                <div key={el.id} className="bg-slate-50/40 p-5 rounded-3xl border border-slate-50 space-y-4">
                                                    <div className="flex justify-between items-center">
                                                        <input className="font-bold bg-transparent outline-none flex-1 uppercase text-sm" value={el.label} onChange={e => setFormData({ ...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(item => item.id === el.id ? {...item, label: e.target.value} : item)} : r)})}/>
                                                        <button onClick={() => { setActiveTarget({roomId: room.id, elId: el.id}); fileInputRef.current.click(); }} className="w-10 h-10 bg-white border border-slate-100 rounded-xl flex items-center justify-center text-slate-400 hover:text-slate-900 shadow-sm active:scale-90 transition-transform">
                                                            <Icon name="camera" size={16}/>
                                                        </button>
                                                    </div>
                                                    <div className="flex gap-1.5">
                                                        {['N', 'B', 'M', 'X'].map(s => (
                                                            <button key={s} onClick={() => setFormData({ ...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(item => item.id === el.id ? {...item, status: s} : item)} : r)})} 
                                                            className={`flex-1 py-2.5 text-[9px] font-black rounded-xl transition-all ${el.status === s ? 'bg-slate-900 text-white shadow-lg' : 'bg-white border border-slate-100 text-slate-300'}`}>
                                                                {s === 'N' ? 'NEUF' : s === 'B' ? 'BON' : s === 'M' ? 'MOYEN' : 'DÉGRADÉ'}
                                                            </button>
                                                        ))}
                                                    </div>
                                                    {el.photos?.length > 0 && (
                                                        <div className="flex gap-2 overflow-x-auto py-2 scrollbar-hide">
                                                            {el.photos.map((p, i) => (
                                                                <div key={i} className="relative flex-shrink-0">
                                                                    <img src={p} className="w-20 h-20 object-cover rounded-xl border-2 border-white shadow-md" />
                                                                    <button onClick={() => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(item => item.id === el.id ? {...item, photos: item.photos.filter((_, idx) => idx !== i)} : item)} : r)})} className="absolute -top-1 -right-1 bg-rose-500 text-white rounded-full p-1 shadow-lg">
                                                                        <Icon name="x" size={10}/>
                                                                    </button>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                    <input className="w-full bg-transparent text-xs italic text-slate-400 outline-none border-b border-slate-100 py-1" placeholder="Observation spécifique..." value={el.comment} onChange={e => setFormData({ ...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(item => item.id === el.id ? {...item, comment: e.target.value} : item)} : r)})}/>
                                                </div>
                                            ))}
                                            <button onClick={() => setFormData({ ...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: [...r.elements, { id: Date.now(), label: 'Nouvel Élément', status: 'B', comment: '', photos: [] }]} : r)})} className="w-full py-4 border-2 border-dashed border-slate-100 rounded-2xl text-[10px] font-black uppercase text-slate-300 hover:text-slate-900 hover:border-slate-900 transition-all">
                                                + Ajouter Élément
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {step === 3 && (
                            <div className="space-y-12 animate-in">
                                <h2 className="text-5xl font-black italic tracking-tighter uppercase leading-none text-slate-900">Signatures</h2>
                                <SignatureBox label="Le Bailleur (Propriétaire)" savedImage={formData.signatures.owner} onSave={img => setFormData({...formData, signatures: {...formData.signatures, owner: img}})} />
                                <SignatureBox label="Le Locataire" savedImage={formData.signatures.tenant} onSave={img => setFormData({...formData, signatures: {...formData.signatures, tenant: img}})} />
                                
                                <div className="bg-slate-900 text-white p-8 rounded-[3rem] space-y-4 shadow-2xl">
                                    <h3 className="text-xl font-black uppercase italic italic">Prêt pour l'envoi</h3>
                                    <p className="text-xs text-slate-400 font-bold uppercase leading-relaxed tracking-wide">
                                        En finalisant, vous générez le rapport officiel Immo-Alex's. Assurez-vous que toutes les informations sont correctes avant l'impression.
                                    </p>
                                    <button onClick={handleShare} className="w-full bg-white text-slate-900 py-4 rounded-2xl font-black uppercase text-[11px] tracking-[0.2em] flex items-center justify-center gap-2">
                                        <Icon name="send" size={16}/> Partager le rapport
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-8 inset-x-0 px-6 no-print z-[200]">
                        <div className="max-w-xl mx-auto bg-white/70 backdrop-blur-2xl p-4 rounded-[2.5rem] shadow-2xl border border-white/50 flex gap-4 items-center">
                            {step > 1 && (
                                <button onClick={() => setStep(step - 1)} className="w-16 h-16 bg-white rounded-full flex items-center justify-center text-slate-900 shadow-sm border border-slate-50 active:scale-90 transition-transform">
                                    <Icon name="chevron-left" size={24}/>
                                </button>
                            )}
                            <button onClick={() => { if(step < 3) setStep(step + 1); else window.print(); }} className="flex-1 h-16 bg-slate-900 text-white rounded-[1.8rem] font-black uppercase tracking-[0.2em] text-[10px] shadow-xl flex items-center justify-center gap-2 active:scale-95 transition-transform">
                                {step === 3 ? <Icon name="check-circle" size={16} /> : null}
                                {step === 3 ? 'Générer & Imprimer' : 'Suivant'}
                                {step < 3 ? <Icon name="chevron-right" size={16} /> : null}
                            </button>
                        </div>
                    </nav>

                    {/* RENDU POUR L'IMPRESSION PDF */}
                    <div className="print-only p-12 bg-white text-slate-900">
                        <div className="border-b-8 border-slate-900 pb-8 mb-12 flex justify-between items-end">
                            <div>
                                <h1 className="text-6xl font-black uppercase italic tracking-tighter">Immo-Alex's</h1>
                                <p className="text-xs font-bold uppercase text-slate-400 tracking-[0.3em] mt-2">Expertise Immobilière</p>
                            </div>
                            <p className="text-3xl font-black tracking-tighter italic">{formData.property.date}</p>
                        </div>
                        
                        <div className="grid grid-cols-2 gap-10 mb-12">
                            <div className="bg-slate-50 p-8 rounded-[3rem]">
                                <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Adresse du Bien</span>
                                <p className="text-2xl font-bold mt-2 leading-tight">{formData.property.address}</p>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-slate-50 p-6 rounded-3xl">
                                    <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Bailleur</span>
                                    <p className="font-bold uppercase mt-1">{formData.property.owner || '-'}</p>
                                </div>
                                <div className="bg-slate-50 p-6 rounded-3xl">
                                    <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Locataire</span>
                                    <p className="font-bold uppercase mt-1">{formData.property.tenant || '-'}</p>
                                </div>
                            </div>
                        </div>

                        {formData.rooms.map(room => (
                            <div key={room.id} className="mb-12 break-inside-avoid">
                                <h3 className="text-2xl font-black uppercase bg-slate-900 text-white p-5 rounded-2xl mb-6 italic tracking-wider">{room.name}</h3>
                                {room.elements.map(el => (
                                    <div key={el.id} className="border-b border-slate-100 py-8 grid grid-cols-4 gap-6">
                                        <div className="font-black uppercase text-sm">{el.label}</div>
                                        <div className="text-center">
                                            <span className={`px-4 py-2 rounded-lg font-black text-xs ${el.status === 'B' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100'}`}>
                                                {el.status === 'N' ? 'NEUF' : el.status === 'B' ? 'BON' : el.status === 'M' ? 'MOYEN' : 'DÉGRADÉ'}
                                            </span>
                                        </div>
                                        <div className="col-span-2 space-y-4">
                                            <div className="flex flex-wrap gap-2">
                                                {el.photos?.map((p, i) => <img key={i} src={p} className="w-40 h-40 object-cover rounded-2xl border border-slate-200 shadow-sm" />)}
                                            </div>
                                            <p className="text-xs italic text-slate-500 font-medium">Observation : {el.comment || 'Aucune remarque particulière.'}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ))}

                        <div className="mt-20 pt-10 border-t-8 border-slate-900 grid grid-cols-2 gap-20 break-inside-avoid">
                            <div className="bg-slate-50 p-12 rounded-[4rem] text-center border border-slate-100">
                                <span className="text-[10px] font-black uppercase tracking-[0.3em] mb-8 block text-slate-400">Signature Bailleur</span>
                                {formData.signatures.owner && <img src={formData.signatures.owner} className="h-48 mx-auto" />}
                            </div>
                            <div className="bg-slate-50 p-12 rounded-[4rem] text-center border border-slate-100">
                                <span className="text-[10px] font-black uppercase tracking-[0.3em] mb-8 block text-slate-400">Signature Locataire</span>
                                {formData.signatures.tenant && <img src={formData.signatures.tenant} className="h-48 mx-auto" />}
                            </div>
                        </div>
                    </div>

                    {isProcessing && <div className="fixed inset-0 bg-white/90 backdrop-blur-xl z-[3000] flex items-center justify-center flex-col animate-in"><div className="w-16 h-16 border-4 border-slate-900 border-t-transparent rounded-full animate-spin"></div><p className="mt-6 text-[10px] font-black uppercase tracking-widest">Traitement Immo-Alex's...</p></div>}
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>

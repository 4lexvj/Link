<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Appart-Alex | Gestion Multi-EDL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; margin: 0; padding: 0; color: black !important; }
            .print-only { display: block !important; }
            .room-section, .inventory-section { break-inside: avoid; border-left: 3px solid #000 !important; margin-bottom: 30px; padding-left: 20px; page-break-inside: avoid; }
            .signature-container { break-inside: avoid; margin-top: 40px; page-break-inside: avoid; }
            .max-w-3xl { max-width: 100% !important; width: 100% !important; box-shadow: none !important; margin: 0 !important; }
            header, nav, footer, .photo-delete-btn, .add-btn, .counter-btn { display: none !important; }
            input, textarea, select { border: none !important; background: transparent !important; appearance: none !important; padding: 0 !important; font-weight: bold !important; }
            .photo-grid { display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 10px !important; margin-top: 10px !important; }
            img { max-width: 100% !important; border: 1px solid #eee !important; display: block !important; }
        }
        
        body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .signature-pad { border: 2px dashed #cbd5e1; background: #fff; touch-action: none; cursor: crosshair; }
        .status-pulse { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .offline { background-color: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .syncing { background-color: #3b82f6; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .spinner { border: 2px solid #f3f3f3; border-top: 2px solid #3b82f6; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'appart-alex';

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            window.FB_BRIDGE = { auth, db, appId, doc, setDoc, getDoc, collection, onSnapshot, query, deleteDoc, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
            window.dispatchEvent(new Event('fb-ready'));
        } catch (e) { console.error("Firebase Init Error:", e); }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SignaturePad = ({ label, onSave, savedImage }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const getPos = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };
            const start = (e) => {
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
                ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
                setIsDrawing(true);
            };
            const move = (e) => {
                if (!isDrawing) return;
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(pos.x, pos.y); ctx.stroke();
            };
            const stop = () => { if (!isDrawing) return; setIsDrawing(false); onSave(canvasRef.current.toDataURL()); };
            const clear = () => {
                const ctx = canvasRef.current.getContext('2d');
                ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                onSave(null);
            };
            return (
                <div className="mb-4 signature-container">
                    <div className="flex justify-between items-center mb-2">
                        <label className="block text-[10px] font-bold text-slate-500 uppercase">{label}</label>
                        <button onClick={clear} className="no-print text-[9px] font-bold text-red-400 uppercase">Effacer</button>
                    </div>
                    <div className="relative">
                        <canvas ref={canvasRef} width={400} height={150} className={`signature-pad w-full h-32 rounded-lg border-2 border-dashed border-slate-200 ${savedImage ? 'print:hidden' : ''}`} onMouseDown={start} onMouseMove={move} onMouseUp={stop} onTouchStart={start} onTouchMove={move} onTouchEnd={stop} />
                        {savedImage && <img src={savedImage} className="hidden print:block w-full h-32 object-contain border rounded-lg" />}
                    </div>
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('list');
            const [isInitialized, setIsInitialized] = useState(false);
            const [user, setUser] = useState(null);
            const [edlList, setEdlList] = useState([]);
            const [currentEdlId, setCurrentEdlId] = useState(null);
            const [step, setStep] = useState(1);
            const [syncStatus, setSyncStatus] = useState('offline');
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);
            const [activeElement, setActiveElement] = useState(null);
            const [formData, setFormData] = useState(null);

            const defaultData = () => ({
                address: "",
                date: new Date().toLocaleDateString('fr-FR'),
                owner: "", tenant: "",
                rooms: [{ id: 1, name: 'Entrée', elements: [{ id: 101, label: 'Porte', status: 'Bon', comment: '', photos: [] }] }],
                inventory: [
                    { id: 201, label: 'Assiettes plates', count: 0 },
                    { id: 202, label: 'Assiettes creuses', count: 0 },
                    { id: 203, label: 'Verres', count: 0 },
                    { id: 204, label: 'Couverts (Fourchettes/Couteaux/Cuillères)', count: 0 }
                ],
                generalComments: "",
                signatures: { owner: null, tenant: null }
            });

            const compressImage = (base64) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600; 
                        let width = img.width; let height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.5));
                    };
                });
            };

            useEffect(() => {
                const initAuth = async () => {
                    if (!window.FB_BRIDGE) return;
                    const b = window.FB_BRIDGE;
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) { await b.signInWithCustomToken(b.auth, __initial_auth_token); }
                        else { await b.signInAnonymously(b.auth); }
                    } catch (e) { console.error("Auth Error:", e); }
                    const unsubscribe = b.onAuthStateChanged(b.auth, (u) => { setUser(u); setSyncStatus(u ? 'online' : 'offline'); setIsInitialized(true); });
                    return () => unsubscribe();
                };
                window.addEventListener('fb-ready', initAuth);
                if (window.FB_BRIDGE) initAuth();
                return () => window.removeEventListener('fb-ready', initAuth);
            }, []);

            useEffect(() => {
                if (!user || !window.FB_BRIDGE?.db) return;
                const b = window.FB_BRIDGE;
                const path = b.collection(b.db, 'artifacts', b.appId, 'users', user.uid, 'edl');
                const unsubscribe = b.onSnapshot(path, (s) => {
                    const list = []; s.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    setEdlList(list);
                }, (e) => console.error(e));
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (!user || !window.FB_BRIDGE?.db || !formData || !currentEdlId) return;
                const b = window.FB_BRIDGE;
                const timer = setTimeout(async () => {
                    setSyncStatus('syncing');
                    try {
                        const docRef = b.doc(b.db, 'artifacts', b.appId, 'users', user.uid, 'edl', currentEdlId);
                        await b.setDoc(docRef, formData, { merge: true });
                        setSyncStatus('online');
                    } catch (e) { setSyncStatus('offline'); }
                }, 1500);
                return () => clearTimeout(timer);
            }, [formData, user, currentEdlId]);

            const updateInventory = (id, delta) => {
                setFormData({
                    ...formData,
                    inventory: formData.inventory.map(item => 
                        item.id === id ? { ...item, count: Math.max(0, item.count + delta) } : item
                    )
                });
            };

            const addInventoryItem = () => {
                setFormData({
                    ...formData,
                    inventory: [...formData.inventory, { id: Date.now(), label: 'Nouvel article', count: 0 }]
                });
            };

            const handlePhoto = async (e) => {
                const file = e.target.files[0];
                if (!file || !activeElement) return;
                setIsUploading(true);
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const compressed = await compressImage(event.target.result);
                    setFormData(prev => ({
                        ...prev,
                        rooms: prev.rooms.map(r => r.id === activeElement.roomId ? {
                            ...r,
                            elements: r.elements.map(el => el.id === activeElement.elId ? {
                                ...el, photos: [...(el.photos || []), compressed].slice(-6)
                            } : el)
                        } : r)
                    }));
                    setIsUploading(false);
                };
                reader.readAsDataURL(file);
            };

            if (!isInitialized) return <div className="h-screen flex items-center justify-center font-black italic animate-pulse">Appart-Alex</div>;

            if (view === 'list') return (
                <div className="max-w-xl mx-auto p-6 min-h-screen">
                    <div className="flex justify-between items-center mb-10">
                        <h1 className="text-3xl font-black italic uppercase">Appart-Alex</h1>
                        <div className={`status-pulse ${syncStatus === 'online' ? 'online' : 'offline'}`}></div>
                    </div>
                    <button onClick={() => { setFormData(defaultData()); setCurrentEdlId("edl_"+Date.now()); setView('editor'); setStep(1); }} className="w-full py-6 bg-blue-600 text-white rounded-3xl font-black uppercase text-sm shadow-xl mb-8">+ Nouvel État des Lieux</button>
                    <div className="space-y-4">
                        <h2 className="text-[10px] font-black uppercase text-slate-400 tracking-widest px-2">Historique</h2>
                        {edlList.map(item => (
                            <div key={item.id} onClick={() => { setFormData(item); setCurrentEdlId(item.id); setView('editor'); setStep(1); }} className="p-5 bg-white rounded-2xl border border-slate-100 flex justify-between items-center cursor-pointer">
                                <div><p className="font-bold">{item.address || "Sans adresse"}</p><p className="text-[10px] text-slate-400 font-bold uppercase">{item.date} • {item.tenant || 'Sans locataire'}</p></div>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" className="text-slate-200"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="max-w-3xl mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative">
                    <input type="file" accept="image/*" capture="environment" ref={fileInputRef} className="hidden" onChange={handlePhoto} />
                    
                    <header className="no-print bg-slate-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center">
                        <button onClick={() => setView('list')} className="p-2"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                        <div className="text-center font-black italic uppercase">Appart-Alex</div>
                        <button onClick={() => window.print()} className="p-2 bg-blue-600 rounded-lg"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg></button>
                    </header>

                    <nav className="no-print flex border-b bg-white sticky top-[68px] z-40 overflow-x-auto scrollbar-hide">
                        {[1, 2, 3, 4].map(n => (
                            <button key={n} onClick={() => setStep(n)} className={`flex-1 py-4 px-2 text-[9px] font-black uppercase tracking-tighter ${step === n ? 'text-blue-600 border-b-4 border-blue-600' : 'text-slate-400'}`}>
                                {n === 1 ? 'Infos' : n === 2 ? 'Visite' : n === 3 ? 'Vaisselle' : 'Signatures'}
                            </button>
                        ))}
                    </nav>

                    <main className="p-6 flex-1">
                        {/* ZONE D'IMPRESSION */}
                        <div className="hidden print:block">
                            <h1 className="text-4xl font-black uppercase italic mb-10 border-b-4 border-black pb-4 text-center">État des Lieux Contradictoire</h1>
                            <div className="grid grid-cols-2 gap-8 mb-10">
                                <div className="p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl">
                                    <p className="text-[10px] font-black uppercase text-slate-400 mb-1">Adresse :</p>
                                    <p className="font-bold text-xl">{formData.address}</p>
                                </div>
                                <div className="space-y-4">
                                    <p><b>Propriétaire :</b> {formData.owner}</p>
                                    <p><b>Locataire :</b> {formData.tenant}</p>
                                    <p><b>Date :</b> {formData.date}</p>
                                </div>
                            </div>

                            {formData.rooms.map(r => (
                                <div key={r.id} className="room-section mb-10">
                                    <h2 className="text-xl font-black uppercase bg-black text-white px-4 py-2 mb-6 inline-block">{r.name}</h2>
                                    {r.elements.map(el => (
                                        <div key={el.id} className="mb-8 border-b border-slate-50 pb-6">
                                            <div className="flex justify-between font-black uppercase mb-2"><span>{el.label}</span><span>{el.status}</span></div>
                                            {el.comment && <p className="text-sm italic text-slate-600 mb-4 bg-slate-50 p-2 border-l-2 border-slate-200">{el.comment}</p>}
                                            <div className="photo-grid">
                                                {el.photos?.map((p, i) => <img key={i} src={p} className="h-40 w-full object-cover rounded-xl" />)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ))}

                            <div className="inventory-section mb-10 mt-10">
                                <h2 className="text-xl font-black uppercase bg-slate-200 text-black px-4 py-2 mb-6 inline-block">Inventaire de la Vaisselle</h2>
                                <div className="grid grid-cols-2 gap-x-10 gap-y-2">
                                    {formData.inventory.map(item => (
                                        <div key={item.id} className="flex justify-between border-b py-2 text-sm">
                                            <span>{item.label}</span>
                                            <span className="font-black">x {item.count}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {formData.generalComments && (
                                <div className="mb-10 p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl">
                                    <h2 className="text-[10px] font-black uppercase text-slate-400 mb-4">Observations Générales</h2>
                                    <p className="text-sm whitespace-pre-wrap">{formData.generalComments}</p>
                                </div>
                            )}

                            <div className="grid grid-cols-2 gap-10 mt-20 signature-container">
                                <div className="text-center">
                                    <p className="text-[10px] font-black uppercase mb-4">Signature Propriétaire</p>
                                    {formData.signatures.owner && <img src={formData.signatures.owner} className="max-h-32 mx-auto" />}
                                </div>
                                <div className="text-center">
                                    <p className="text-[10px] font-black uppercase mb-4">Signature Locataire</p>
                                    {formData.signatures.tenant && <img src={formData.signatures.tenant} className="max-h-32 mx-auto" />}
                                </div>
                            </div>
                        </div>

                        {/* ZONE D'ÉDITION ÉCRAN */}
                        <div className="no-print space-y-6">
                            {step === 1 && (
                                <div className="space-y-6 animate-in fade-in duration-300">
                                    <div className="p-6 bg-slate-50 rounded-3xl border border-slate-200">
                                        <label className="text-[10px] font-black text-slate-400 uppercase block mb-2">Adresse du logement</label>
                                        <input type="text" className="w-full bg-transparent text-xl font-bold outline-none" placeholder="Ex: 12 rue des Alpes, Chambéry" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="p-5 bg-slate-50 rounded-3xl border border-slate-200">
                                            <label className="text-[10px] font-black text-slate-400 uppercase block mb-2">Bailleur</label>
                                            <input type="text" className="w-full bg-transparent font-bold outline-none" value={formData.owner} onChange={e => setFormData({...formData, owner: e.target.value})} />
                                        </div>
                                        <div className="p-5 bg-slate-50 rounded-3xl border border-slate-200">
                                            <label className="text-[10px] font-black text-slate-400 uppercase block mb-2">Locataire</label>
                                            <input type="text" className="w-full bg-transparent font-bold outline-none" value={formData.tenant} onChange={e => setFormData({...formData, tenant: e.target.value})} />
                                        </div>
                                    </div>
                                </div>
                            )}

                            {step === 2 && (
                                <div className="space-y-8 animate-in slide-in-from-right">
                                    {formData.rooms.map(room => (
                                        <div key={room.id} className="bg-slate-50 p-5 rounded-[32px] border border-slate-200 shadow-sm">
                                            <div className="flex justify-between items-center mb-6">
                                                <input className="text-xl font-black uppercase bg-transparent outline-none flex-1 tracking-tighter" value={room.name} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, name: e.target.value} : r)})} />
                                                <button onClick={() => setFormData({...formData, rooms: formData.rooms.filter(r => r.id !== room.id)})} className="text-red-300 p-2"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                                            </div>
                                            <div className="space-y-5">
                                                {room.elements.map(el => (
                                                    <div key={el.id} className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                                                        <div className="flex justify-between items-center mb-4">
                                                            <input className="font-bold text-slate-800 outline-none flex-1" value={el.label} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, label: e.target.value} : e2)} : r)})} />
                                                            <select className="text-[10px] font-black uppercase bg-slate-100 p-2 px-3 rounded-xl border-none outline-none appearance-none" value={el.status} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, status: e.target.value} : e2)} : r)})}>
                                                                <option>Neuf</option><option>Bon</option><option>Moyen</option><option>Mauvais</option>
                                                            </select>
                                                        </div>
                                                        <div className="flex gap-3 overflow-x-auto mb-4 scrollbar-hide py-1">
                                                            <button onClick={() => { setActiveElement({roomId: room.id, elId: el.id}); fileInputRef.current.click(); }} className="w-14 h-14 shrink-0 rounded-2xl flex items-center justify-center border-2 border-dashed border-slate-200 bg-slate-50">{isUploading && activeElement?.elId === el.id ? <div className="spinner"></div> : <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>}</button>
                                                            {el.photos?.map((p, idx) => (
                                                                <div key={idx} className="relative shrink-0"><img src={p} className="w-14 h-14 object-cover rounded-2xl" /><button onClick={() => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, photos: e2.photos.filter((_, i) => i !== idx)} : e2)} : r)})} className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-0.5"><svg xmlns="http://www.w3.org/2000/svg" width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div>
                                                            ))}
                                                        </div>
                                                        <textarea className="w-full text-xs text-slate-500 bg-slate-50 p-3 rounded-xl outline-none" placeholder="Observations..." rows="2" value={el.comment} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, comment: e.target.value} : e2)} : r)})} />
                                                    </div>
                                                ))}
                                                <button onClick={() => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: [...r.elements, {id: Date.now(), label: 'Nouvel élément', status: 'Bon', comment: '', photos: []}]} : r)})} className="w-full py-3 bg-white border border-slate-200 rounded-xl text-[10px] font-black uppercase text-slate-400 hover:bg-slate-100 transition-colors">+ Ajouter un équipement</button>
                                            </div>
                                        </div>
                                    ))}
                                    <button onClick={() => setFormData({...formData, rooms: [...formData.rooms, {id: Date.now(), name: 'Nouvelle Pièce', elements: []}]})} className="w-full py-6 bg-slate-900 text-white rounded-3xl font-black text-xs uppercase shadow-xl tracking-widest active:scale-95 transition-transform">Ajouter une Pièce</button>
                                </div>
                            )}

                            {step === 3 && (
                                <div className="space-y-4 animate-in slide-in-from-right duration-300">
                                    <h3 className="text-xl font-black uppercase mb-4 tracking-tighter">Inventaire de la Vaisselle</h3>
                                    <div className="space-y-3">
                                        {formData.inventory.map(item => (
                                            <div key={item.id} className="bg-white p-4 rounded-2xl border border-slate-200 flex items-center justify-between shadow-sm">
                                                <input className="flex-1 font-bold outline-none mr-4" value={item.label} onChange={e => setFormData({...formData, inventory: formData.inventory.map(i => i.id === item.id ? {...i, label: e.target.value} : i)})} />
                                                <div className="flex items-center gap-4 bg-slate-50 p-1 rounded-xl border border-slate-100">
                                                    <button onClick={() => updateInventory(item.id, -1)} className="w-8 h-8 rounded-lg bg-white border border-slate-200 flex items-center justify-center font-black text-slate-400 active:bg-slate-100 shadow-sm">-</button>
                                                    <span className="w-8 text-center font-black text-blue-600">{item.count}</span>
                                                    <button onClick={() => updateInventory(item.id, 1)} className="w-8 h-8 rounded-lg bg-blue-600 text-white flex items-center justify-center font-black active:bg-blue-700 shadow-sm shadow-blue-100">+</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={addInventoryItem} className="w-full py-4 bg-slate-100 text-slate-500 rounded-2xl font-black uppercase text-[10px] tracking-widest mt-6">+ Ajouter une ligne de vaisselle</button>
                                </div>
                            )}

                            {step === 4 && (
                                <div className="space-y-8 animate-in slide-in-from-right duration-300">
                                    <div className="p-5 bg-white rounded-3xl border border-slate-200">
                                        <label className="text-[10px] font-black text-slate-400 uppercase block mb-3">Observations Générales (bloc-notes)</label>
                                        <textarea className="w-full bg-transparent font-medium text-sm outline-none placeholder:text-slate-300" placeholder="Ex: Remise des clés en 2 exemplaires, compteurs d'eau relevés à 120m3..." rows="4" value={formData.generalComments} onChange={e => setFormData({...formData, generalComments: e.target.value})} />
                                    </div>

                                    <div className="space-y-10 py-6">
                                        <SignaturePad label="Propriétaire / Bailleur" savedImage={formData.signatures.owner} onSave={img => setFormData({...formData, signatures: {...formData.signatures, owner: img}})} />
                                        <SignaturePad label="Locataire" savedImage={formData.signatures.tenant} onSave={img => setFormData({...formData, signatures: {...formData.signatures, tenant: img}})} />
                                        <div className="bg-blue-50 p-6 rounded-3xl border border-blue-100">
                                            <p className="text-[10px] font-black text-blue-400 uppercase mb-2">Finalisation</p>
                                            <p className="text-xs text-blue-600 leading-relaxed font-medium italic">En signant ce document, les parties reconnaissent l'exactitude des constatations effectuées lors de la visite du logement.</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    <footer className="no-print p-6 border-t bg-white flex gap-4 sticky bottom-0 z-40">
                        {step > 1 && <button onClick={() => setStep(step-1)} className="px-6 py-4 bg-white border-2 border-slate-100 font-bold rounded-2xl text-slate-400 active:bg-slate-50 transition-colors">Retour</button>}
                        <button onClick={() => step < 4 ? setStep(step+1) : window.print()} className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-transform">
                            {step < 4 ? 'Suivant' : 'Finaliser & Exporter PDF'}
                        </button>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

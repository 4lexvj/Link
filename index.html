<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Appart-Alex's | État des Lieux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; margin: 0; padding: 0; }
            .room-section { break-inside: avoid; border-left: 2px solid #000 !important; margin-bottom: 20px; padding-left: 15px; }
            .signature-container { break-inside: avoid; margin-top: 30px; }
            .max-w-3xl { max-width: 100% !important; width: 100% !important; box-shadow: none !important; }
        }
        
        body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .signature-pad { border: 2px dashed #cbd5e1; background: #fff; touch-action: none; cursor: crosshair; }
        
        .loader-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        .status-pulse {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px;
        }
        .online { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .offline { background-color: #94a3b8; }
        .syncing { background-color: #3b82f6; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // VOS PARAMÈTRES RÉELS
        const firebaseConfig = {
            apiKey: "AIzaSyDFm8IK-Wl0T4U5n8SNkXs6aE6ePU807_c",
            authDomain: "link-immo-drumet.firebaseapp.com",
            projectId: "link-immo-drumet",
            storageBucket: "link-immo-drumet.firebasestorage.app",
            messagingSenderId: "817653872182",
            appId: "1:817653872182:web:9c897b78732397464f8a97"
        };
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'appart-alex';

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            window.FB_BRIDGE = {
                auth, db, appId,
                doc, setDoc, collection, onSnapshot,
                signInAnonymously, onAuthStateChanged
            };
        } catch (e) {
            console.error("Firebase Init Fail", e);
        }
        window.dispatchEvent(new Event('fb-check'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SignaturePad = ({ label, onSave, savedImage }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            const getPos = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => {
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#0f172a';
                ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
                setIsDrawing(true);
            };

            const move = (e) => {
                if (!isDrawing) return;
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(pos.x, pos.y); ctx.stroke();
            };

            const stop = () => {
                if (!isDrawing) return;
                setIsDrawing(false);
                onSave(canvasRef.current.toDataURL());
            };

            return (
                <div className="mb-4 signature-container">
                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-2">{label}</label>
                    <div className="relative">
                        <canvas 
                            ref={canvasRef} width={400} height={150}
                            className={`signature-pad w-full h-32 rounded-lg border-2 border-dashed border-slate-200 ${savedImage ? 'print:hidden' : ''}`}
                            onMouseDown={start} onMouseMove={move} onMouseUp={stop}
                            onTouchStart={start} onTouchMove={move} onTouchEnd={stop}
                        />
                        {savedImage && <img src={savedImage} className="hidden print:block w-full h-32 object-contain border rounded-lg" />}
                    </div>
                </div>
            );
        };

        function App() {
            const [isInitialized, setIsInitialized] = useState(false);
            const [user, setUser] = useState(null);
            const [step, setStep] = useState(1);
            const [syncStatus, setSyncStatus] = useState('offline');
            const fileInputRef = useRef(null);
            const [activeElement, setActiveElement] = useState(null);
            
            const [formData, setFormData] = useState({
                address: "",
                date: new Date().toLocaleDateString('fr-FR'),
                owner: "", tenant: "",
                rooms: [{ id: 1, name: 'Entrée', elements: [{ id: 101, label: 'Porte', status: 'Bon', comment: '', photos: [] }] }],
                signatures: { owner: null, tenant: null }
            });

            useEffect(() => {
                const attemptAuth = async () => {
                    if (!window.FB_BRIDGE) {
                        setTimeout(() => setIsInitialized(true), 1500);
                        return;
                    }

                    const b = window.FB_BRIDGE;
                    try {
                        await b.signInAnonymously(b.auth);
                    } catch (e) {
                        console.warn("Auth failed");
                    }

                    b.onAuthStateChanged(b.auth, (u) => {
                        setUser(u);
                        setSyncStatus(u ? 'online' : 'offline');
                        setIsInitialized(true);
                    });
                };

                window.addEventListener('fb-check', attemptAuth);
                if (window.FB_BRIDGE) attemptAuth();
                
                // Sécurité : affichage forcé au bout de 2s max
                const timer = setTimeout(() => setIsInitialized(true), 2000);
                return () => clearTimeout(timer);
            }, []);

            // Sauvegarde Cloud (si user connecté)
            useEffect(() => {
                if (!user || !window.FB_BRIDGE) return;
                const b = window.FB_BRIDGE;
                const timer = setTimeout(async () => {
                    setSyncStatus('syncing');
                    try {
                        const docRef = b.doc(b.db, 'artifacts', b.appId, 'users', user.uid, 'edl', 'current');
                        await b.setDoc(docRef, { ...formData, lastUpdated: new Date().toISOString() }, { merge: true });
                        setSyncStatus('online');
                    } catch (e) { setSyncStatus('offline'); }
                }, 2000);
                return () => clearTimeout(timer);
            }, [formData, user]);

            const triggerPhoto = (roomId, elId) => {
                setActiveElement({ roomId, elId });
                fileInputRef.current.click();
            };

            const handlePhoto = (e) => {
                const file = e.target.files[0];
                if (!file || !activeElement) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    setFormData(prev => ({
                        ...prev,
                        rooms: prev.rooms.map(r => r.id === activeElement.roomId ? {
                            ...r,
                            elements: r.elements.map(el => el.id === activeElement.elId ? {
                                ...el, photos: [...(el.photos || []), reader.result]
                            } : el)
                        } : r)
                    }));
                };
                reader.readAsDataURL(file);
            };

            if (!isInitialized) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white">
                    <div className="text-4xl font-black italic tracking-tighter mb-4 text-slate-900">Appart-Alex</div>
                    <div className="text-[10px] font-bold uppercase tracking-[0.3em] text-slate-400 loader-dots">Connexion au Cloud</div>
                </div>
            );

            return (
                <div className="max-w-3xl mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative">
                    <input type="file" accept="image/*" capture="environment" ref={fileInputRef} className="hidden" onChange={handlePhoto} />
                    
                    <header className="no-print bg-slate-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center">
                        <div>
                            <span className="text-xl font-black italic tracking-tighter uppercase">Appart-Alex</span>
                            <div className="flex items-center">
                                <span className={`status-pulse ${syncStatus === 'online' ? 'online' : (syncStatus === 'syncing' ? 'syncing' : 'offline')}`}></span>
                                <span className="text-[9px] font-bold uppercase text-slate-500">{syncStatus === 'syncing' ? 'Synchronisation...' : (user ? 'Cloud Actif' : 'Mode Local')}</span>
                            </div>
                        </div>
                        <button onClick={() => window.print()} className="p-2 bg-blue-600 rounded-lg shadow-lg active:scale-95 transition-transform"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg></button>
                    </header>

                    <nav className="no-print flex border-b bg-white">
                        {[1, 2, 3].map(n => (
                            <button key={n} onClick={() => setStep(n)} className={`flex-1 py-4 text-[10px] font-black uppercase tracking-widest transition-all ${step === n ? 'text-blue-600 border-b-4 border-blue-600' : 'text-slate-400'}`}>
                                {n === 1 ? 'Propriété' : n === 2 ? 'Inventaire' : 'Signatures'}
                            </button>
                        ))}
                    </nav>

                    <main className="p-6 flex-1">
                        {step === 1 && (
                            <div className="space-y-6">
                                <div className="p-5 bg-slate-50 rounded-2xl border border-slate-200">
                                    <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">Adresse du Bien</label>
                                    <input type="text" className="w-full bg-transparent text-lg font-bold outline-none" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} placeholder="Ex: 45 Boulevard des Lilas..." />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="p-4 bg-slate-50 rounded-2xl border border-slate-200">
                                        <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">Bailleur</label>
                                        <input type="text" className="w-full bg-transparent font-bold outline-none" value={formData.owner} onChange={e => setFormData({...formData, owner: e.target.value})} placeholder="Nom..." />
                                    </div>
                                    <div className="p-4 bg-slate-50 rounded-2xl border border-slate-200">
                                        <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">Locataire</label>
                                        <input type="text" className="w-full bg-transparent font-bold outline-none" value={formData.tenant} onChange={e => setFormData({...formData, tenant: e.target.value})} placeholder="Nom..." />
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="space-y-6">
                                {formData.rooms.map(room => (
                                    <div key={room.id} className="room-section border-l-4 border-slate-900 bg-slate-50 p-4 rounded-r-xl shadow-sm mb-6">
                                        <input className="text-lg font-black uppercase bg-transparent outline-none w-full mb-4 text-slate-800" value={room.name} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, name: e.target.value} : r)})} />
                                        <div className="space-y-3">
                                            {room.elements.map(el => (
                                                <div key={el.id} className="bg-white p-3 rounded-xl border shadow-sm transition-all">
                                                    <div className="flex justify-between items-center mb-2">
                                                        <input className="font-bold text-sm outline-none text-slate-700" value={el.label} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, label: e.target.value} : e2)} : r)})} />
                                                        <select className="text-[10px] font-black uppercase bg-slate-100 p-1 rounded" value={el.status} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, status: e.target.value} : e2)} : r)})}>
                                                            <option>Neuf</option><option>Bon</option><option>Moyen</option><option>Mauvais</option>
                                                        </select>
                                                    </div>
                                                    <div className="flex gap-2 overflow-x-auto no-print mb-2 pb-1">
                                                        <button onClick={() => triggerPhoto(room.id, el.id)} className="w-12 h-12 shrink-0 bg-slate-50 rounded-lg flex items-center justify-center text-slate-300 border-2 border-dashed border-slate-200 hover:border-blue-300 hover:text-blue-300 transition-colors">+</button>
                                                        {el.photos?.map((p, idx) => <img key={idx} src={p} className="w-12 h-12 object-cover rounded-lg border shadow-sm" />)}
                                                    </div>
                                                    <textarea className="w-full text-xs text-slate-400 bg-transparent outline-none resize-none" placeholder="Observations..." rows="1" value={el.comment} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, comment: e.target.value} : e2)} : r)})} />
                                                </div>
                                            ))}
                                            <button onClick={() => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: [...r.elements, {id: Date.now(), label: 'Élément', status: 'Bon', comment: '', photos: []}]} : r)})} className="no-print text-[9px] font-bold uppercase text-blue-600 hover:underline">+ Ajouter Élément</button>
                                        </div>
                                    </div>
                                ))}
                                <button onClick={() => setFormData({...formData, rooms: [...formData.rooms, {id: Date.now(), name: 'Nouvelle Pièce', elements: []}]})} className="no-print w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase shadow-xl active:scale-95 transition-all">Ajouter une Pièce</button>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="space-y-8">
                                <div className="p-4 bg-blue-50 border border-blue-100 rounded-xl text-[10px] text-blue-700 font-medium">
                                    Les signatures ci-dessous valident l'état du logement à la date du {formData.date}.
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <SignaturePad label="Propriétaire / Bailleur" savedImage={formData.signatures.owner} onSave={img => setFormData({...formData, signatures: {...formData.signatures, owner: img}})} />
                                    <SignaturePad label="Locataire" savedImage={formData.signatures.tenant} onSave={img => setFormData({...formData, signatures: {...formData.signatures, tenant: img}})} />
                                </div>
                            </div>
                        )}

                        {/* Rendu Print */}
                        <div className="hidden print:block font-serif text-black">
                            <div className="flex justify-between items-end border-b-4 border-black pb-2 mb-8">
                                <h1 className="text-3xl font-black uppercase italic">Appart-Alex</h1>
                                <span className="text-xs font-bold uppercase">Rapport d'État des Lieux</span>
                            </div>
                            <div className="grid grid-cols-2 gap-4 mb-8">
                                <div className="p-4 bg-slate-100 rounded-lg">
                                    <p className="text-[10px] font-bold uppercase text-slate-500 mb-1">Bien</p>
                                    <p className="font-bold">{formData.address || 'Non spécifié'}</p>
                                    <p className="text-[10px] mt-2">Date : {formData.date}</p>
                                </div>
                                <div className="space-y-2">
                                    <p className="text-sm"><b>Bailleur :</b> {formData.owner}</p>
                                    <p className="text-sm"><b>Locataire :</b> {formData.tenant}</p>
                                </div>
                            </div>
                            {formData.rooms.map(r => (
                                <div key={r.id} className="room-section mb-6">
                                    <h2 className="text-xl font-bold uppercase border-b-2 border-black mb-4">{r.name}</h2>
                                    {r.elements.map(el => (
                                        <div key={el.id} className="mb-4 break-inside-avoid border-b border-slate-100 pb-2">
                                            <div className="flex justify-between font-bold text-sm mb-1"><span>{el.label}</span><span className="bg-slate-100 px-2 rounded">[{el.status}]</span></div>
                                            <p className="text-xs italic text-slate-600 mb-2">{el.comment || "Pas d'observations."}</p>
                                            <div className="flex gap-2 mt-2 flex-wrap">
                                                {el.photos?.map((p, i) => <img key={i} src={p} className="h-24 w-24 object-cover border-2 border-slate-200 rounded" />)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ))}
                            <div className="mt-12 grid grid-cols-2 gap-8">
                                <div className="text-center">
                                    <p className="text-[10px] font-bold uppercase mb-2">Signature Bailleur</p>
                                    <div className="border-2 border-black h-32 rounded-lg">{formData.signatures.owner && <img src={formData.signatures.owner} className="h-full w-full object-contain" />}</div>
                                </div>
                                <div className="text-center">
                                    <p className="text-[10px] font-bold uppercase mb-2">Signature Locataire</p>
                                    <div className="border-2 border-black h-32 rounded-lg">{formData.signatures.tenant && <img src={formData.signatures.tenant} className="h-full w-full object-contain" />}</div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="no-print p-6 border-t bg-slate-50 flex gap-4 sticky bottom-0 z-40">
                        {step > 1 && <button onClick={() => setStep(step-1)} className="px-6 py-4 bg-white border border-slate-200 font-bold rounded-2xl text-slate-500 shadow-sm active:scale-95 transition-all">Retour</button>}
                        <button onClick={() => step < 3 ? setStep(step+1) : window.print()} className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">
                            {step < 3 ? 'Suivant' : 'Terminer & PDF'}
                        </button>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

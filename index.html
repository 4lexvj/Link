<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Immo-Alex's Elite Edition</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        
        let firebaseConfig;
        try {
            firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {
                apiKey: "AIzaSyDFm8IK-Wl0T4U5n8SNKxs6aE6ePU807_c",
                authDomain: "link-immo-drumet.firebaseapp.com",
                projectId: "link-immo-drumet",
                storageBucket: "link-immo-drumet.firebasestorage.app",
                messagingSenderId: "817653872182",
                appId: "1:817653872182:web:9c897b78732397464f8a97"
            };
        } catch (e) { console.error(e); }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = window.__app_id || "immo-alex-elite";

        window.FB_SERVICES = { auth, db, appId, signInAnonymously, signInWithCustomToken, onAuthStateChanged, collection, onSnapshot, doc, setDoc, addDoc, getDoc, serverTimestamp };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            #print-zone { display: block !important; }
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-[#FDFDFD] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- COMPOSANTS ---
        const SignaturePad = ({ label, onSave, savedImage }) => {
            const canvasRef = useRef(null);
            const [drawing, setDrawing] = useState(false);
            useEffect(() => {
                if (savedImage || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
                const getPos = (e) => {
                    const r = canvas.getBoundingClientRect();
                    const t = e.touches ? e.touches[0] : e;
                    return { x: t.clientX - r.left, y: t.clientY - r.top };
                };
                canvas.onmousedown = canvas.ontouchstart = (e) => { setDrawing(true); ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
                canvas.onmousemove = canvas.ontouchmove = (e) => { if (!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
                window.onmouseup = window.ontouchend = () => setDrawing(false);
            }, [drawing, savedImage]);

            return (
                <div className="space-y-3">
                    <div className="flex justify-between items-center px-1">
                        <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">{label}</span>
                        {savedImage && <button onClick={() => onSave(null)} className="text-rose-500 text-[10px] font-bold">EFFACER</button>}
                    </div>
                    <div className="h-44 bg-white rounded-[2rem] border border-slate-100 relative overflow-hidden shadow-sm">
                        {savedImage ? <img src={savedImage} className="w-full h-full object-contain p-4" /> : <canvas ref={canvasRef} width={400} height={200} className="w-full h-full cursor-crosshair" />}
                        {!savedImage && <button onClick={() => onSave(canvasRef.current.toDataURL())} className="absolute bottom-3 right-3 bg-slate-900 text-white px-6 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest">Signer</button>}
                    </div>
                </div>
            );
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let width = img.width, height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('list');
            const [reports, setReports] = useState([]);
            const [currentId, setCurrentId] = useState(null);
            const [step, setStep] = useState(1);
            const [sync, setSync] = useState('Vérification...');
            const [isProcessing, setIsProcessing] = useState(false);
            const [shareModal, setShareModal] = useState(null);
            const fileInputRef = useRef(null);
            const [activeEl, setActiveEl] = useState(null);

            const [formData, setFormData] = useState({
                property: { address: '', owner: '', tenant: '', date: new Date().toLocaleDateString('fr-FR') },
                rooms: [{ id: 1, name: 'Entrée', elements: [{ id: 101, label: 'Porte', status: 'B', comment: '', photos: [] }] }],
                signatures: { owner: null, tenant: null }
            });

            // --- INIT FIREBASE ---
            useEffect(() => {
                if (!window.FB_SERVICES) return;
                const { auth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.FB_SERVICES;
                const init = async () => {
                    try {
                        if (window.__initial_auth_token) await signInWithCustomToken(auth, window.__initial_auth_token);
                        else await signInAnonymously(auth);
                        onAuthStateChanged(auth, u => { setUser(u); setSync(u ? 'Connecté' : 'Erreur'); });
                    } catch (e) { setSync('Erreur API'); }
                };
                init();
            }, []);

            // --- REALTIME REPORTS ---
            useEffect(() => {
                if (!user) return;
                const { db, appId, collection, onSnapshot } = window.FB_SERVICES;
                
                // Check if deep link in URL
                const params = new URLSearchParams(window.location.search);
                const reportId = params.get('reportId');
                if (reportId) {
                   setCurrentId(reportId);
                   setView('editor');
                }

                return onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), (snap) => {
                    setReports(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    
                    // If deep linked, load that specific data
                    if (reportId) {
                        const target = snap.docs.find(d => d.id === reportId);
                        if (target) setFormData(target.data());
                    }
                });
            }, [user]);

            const save = async (data = formData) => {
                if (!user) return;
                setSync('Sauvegarde...');
                const { db, appId, doc, setDoc, addDoc, collection } = window.FB_SERVICES;
                try {
                    if (currentId) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', currentId), data);
                    } else {
                        const res = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), data);
                        setCurrentId(res.id);
                    }
                    setSync('Synchronisé');
                } catch (e) { setSync('Erreur'); }
            };

            const handlePhoto = async (e) => {
                const file = e.target.files[0];
                if (!file || !activeEl) return;
                setIsProcessing(true);
                const base64 = await compressImage(file);
                const newData = {
                    ...formData,
                    rooms: formData.rooms.map(r => r.id === activeEl.roomId ? {
                        ...r, elements: r.elements.map(el => el.id === activeEl.elId ? {...el, photos: [...(el.photos || []), base64]} : el)
                    } : r)
                };
                setFormData(newData);
                await save(newData);
                setIsProcessing(false);
                setActiveEl(null);
            };

            const handleShare = (id) => {
                const shareUrl = `${window.location.origin}${window.location.pathname}?reportId=${id}`;
                setShareModal(shareUrl);
                if (navigator.share) {
                    navigator.share({ title: 'État des Lieux', url: shareUrl }).catch(() => {});
                }
            };

            if (!user) return <div className="min-h-screen flex items-center justify-center font-black uppercase text-[10px] tracking-[0.5em] text-slate-300">Initialisation...</div>;

            if (view === 'list') return (
                <div className="max-w-xl mx-auto p-6 pt-20 space-y-8 animate-in fade-in duration-500">
                    <header className="flex justify-between items-start">
                        <div>
                            <h1 className="text-5xl font-black italic uppercase tracking-tighter">Immo-Alex's</h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Dossiers Cloud • {sync}</p>
                        </div>
                    </header>
                    <div className="grid gap-4">
                        {reports.map(r => (
                            <div key={r.id} className="group bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all relative overflow-hidden">
                                <div onClick={() => { setFormData(r); setCurrentId(r.id); setView('editor'); setStep(1); }} className="cursor-pointer">
                                    <h3 className="font-bold uppercase text-sm pr-8">{r.property?.address || 'Sans adresse'}</h3>
                                    <p className="text-[10px] text-slate-400 mt-2 uppercase">{r.property?.date} • {r.property?.tenant}</p>
                                </div>
                                <button onClick={() => handleShare(r.id)} className="absolute top-8 right-8 text-slate-300 hover:text-slate-900 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M15 8a3 3 0 10-2.977-2.63l-4.94 2.47a3 3 0 100 4.319l4.94 2.47a3 3 0 10.895-1.789l-4.94-2.47a3.027 3.027 0 000-.74l4.94-2.47C13.456 7.68 14.19 8 15 8z" /></svg>
                                </button>
                            </div>
                        ))}
                        <button onClick={() => { setCurrentId(null); setView('editor'); setStep(1); setFormData({ property: { address: '', owner: '', tenant: '', date: new Date().toLocaleDateString('fr-FR') }, rooms: [{ id: 1, name: 'Entrée', elements: [{ id: 101, label: 'Porte', status: 'B', comment: '', photos: [] }] }], signatures: { owner: null, tenant: null } }); }} className="py-16 border-2 border-dashed border-slate-200 rounded-[2.5rem] text-[10px] font-black uppercase tracking-widest text-slate-300 hover:text-slate-900 transition-all">+ Nouveau Rapport</button>
                    </div>

                    {shareModal && (
                        <div className="fixed inset-0 z-[100] flex items-end justify-center sm:items-center p-4">
                            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setShareModal(null)}></div>
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 relative animate-slide-up shadow-2xl">
                                <h4 className="text-[10px] font-black uppercase tracking-widest mb-4">Lien de partage</h4>
                                <div className="flex gap-2">
                                    <input readOnly value={shareModal} className="flex-1 bg-slate-50 p-4 rounded-2xl text-[10px] font-mono outline-none" />
                                    <button onClick={() => { document.execCommand('copy'); setShareModal(null); }} className="bg-slate-900 text-white px-6 rounded-2xl text-[10px] font-bold">COPIER</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen pb-32">
                    <input type="file" ref={fileInputRef} className="hidden" accept="image/*" capture="environment" onChange={handlePhoto} />
                    
                    <header className="fixed top-0 inset-x-0 h-16 bg-white/80 backdrop-blur-md border-b z-50 flex items-center justify-between px-6 no-print">
                        <button onClick={() => { 
                            const url = new URL(window.location);
                            url.searchParams.delete('reportId');
                            window.history.pushState({}, '', url);
                            setView('list'); 
                        }} className="text-slate-400 font-bold uppercase text-[10px]">Quitter</button>
                        <span className="text-[9px] font-black uppercase text-emerald-500 tracking-widest">{sync}</span>
                        <button onClick={() => handleShare(currentId)} className="text-slate-400">
                             <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M15 8a3 3 0 10-2.977-2.63l-4.94 2.47a3 3 0 100 4.319l4.94 2.47a3 3 0 10.895-1.789l-4.94-2.47a3.027 3.027 0 000-.74l4.94-2.47C13.456 7.68 14.19 8 15 8z" /></svg>
                        </button>
                    </header>

                    <main className="max-w-xl mx-auto pt-24 px-6 no-print space-y-12">
                        {step === 1 && (
                            <section className="space-y-8 animate-in slide-in-from-bottom-4">
                                <h2 className="text-3xl font-black italic uppercase tracking-tight">Le Bien</h2>
                                <div className="space-y-4 bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-50">
                                    <div className="space-y-1"><label className="text-[10px] font-bold uppercase text-slate-300 ml-2">Adresse</label>
                                    <input className="w-full p-4 rounded-2xl bg-slate-50 font-bold outline-none" value={formData.property.address} onChange={e => setFormData({...formData, property: {...formData.property, address: e.target.value}})} onBlur={() => save()} /></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1"><label className="text-[10px] font-bold uppercase text-slate-300 ml-2">Bailleur</label>
                                        <input className="w-full p-4 rounded-2xl bg-slate-50 font-bold outline-none" value={formData.property.owner} onChange={e => setFormData({...formData, property: {...formData.property, owner: e.target.value}})} onBlur={() => save()} /></div>
                                        <div className="space-y-1"><label className="text-[10px] font-bold uppercase text-slate-300 ml-2">Locataire</label>
                                        <input className="w-full p-4 rounded-2xl bg-slate-50 font-bold outline-none" value={formData.property.tenant} onChange={e => setFormData({...formData, property: {...formData.property, tenant: e.target.value}})} onBlur={() => save()} /></div>
                                    </div>
                                </div>
                            </section>
                        )}

                        {step === 2 && (
                            <section className="space-y-8 animate-in slide-in-from-bottom-4">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-3xl font-black italic uppercase tracking-tight">Inventaire</h2>
                                    <button onClick={() => { const d = {...formData, rooms: [...formData.rooms, {id: Date.now(), name: 'Nouvelle Pièce', elements: [{id: Date.now()+1, label: 'Élément', status: 'B', comment: '', photos: []}]}]}; setFormData(d); save(d); }} className="bg-slate-900 text-white w-10 h-10 rounded-full font-bold shadow-lg">+</button>
                                </div>
                                {formData.rooms.map(room => (
                                    <div key={room.id} className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-50 space-y-6">
                                        <div className="flex justify-between items-center border-b pb-4">
                                            <input className="font-black uppercase text-lg outline-none w-full" value={room.name} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, name: e.target.value} : r)})} onBlur={() => save()} />
                                            <button onClick={() => { const d = {...formData, rooms: formData.rooms.filter(r => r.id !== room.id)}; setFormData(d); save(d); }} className="text-slate-200 hover:text-rose-500 transition-colors ml-4">×</button>
                                        </div>
                                        <div className="space-y-6">
                                            {room.elements.map(el => (
                                                <div key={el.id} className="bg-slate-50/50 p-6 rounded-3xl space-y-4">
                                                    <div className="flex justify-between items-center">
                                                        <input className="font-bold text-sm uppercase bg-transparent outline-none w-full" value={el.label} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(item => item.id === el.id ? {...item, label: e.target.value} : item)} : r)})} onBlur={() => save()} />
                                                        <button onClick={() => { const d = {...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.filter(i => i.id !== el.id)} : r)}; setFormData(d); save(d); }} className="text-slate-300">×</button>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        {['N', 'B', 'M', 'X'].map(s => (
                                                            <button key={s} onClick={() => { const d = {...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(item => item.id === el.id ? {...item, status: s} : item)} : r)}; setFormData(d); save(d); }} 
                                                                className={`flex-1 py-3 rounded-2xl text-[10px] font-black transition-all ${el.status === s ? 'bg-slate-900 text-white scale-105 shadow-lg' : 'bg-white text-slate-300'}`}>
                                                                {s === 'N' ? 'NEUF' : s === 'B' ? 'BON' : s === 'M' ? 'MOYEN' : 'DÉGRADÉ'}
                                                            </button>
                                                        ))}
                                                        <button onClick={() => { setActiveEl({roomId: room.id, elId: el.id}); fileInputRef.current.click(); }} className="w-12 h-12 flex items-center justify-center bg-white text-slate-400 rounded-2xl border hover:text-slate-900 transition-colors shadow-sm">📷</button>
                                                    </div>
                                                    {el.photos?.length > 0 && (
                                                        <div className="flex gap-2 overflow-x-auto py-2 scrollbar-hide">
                                                            {el.photos.map((ph, idx) => (
                                                                <img key={idx} src={ph} className="w-16 h-16 min-w-[4rem] object-cover rounded-xl border-2 border-white shadow-sm" />
                                                            ))}
                                                        </div>
                                                    )}
                                                    <input className="w-full bg-transparent border-b border-slate-100 text-[10px] italic outline-none focus:border-slate-900" placeholder="Observations..." value={el.comment} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(item => item.id === el.id ? {...item, comment: e.target.value} : item)} : r)})} onBlur={() => save()} />
                                                </div>
                                            ))}
                                            <button onClick={() => { const d = {...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: [...r.elements, {id: Date.now(), label: 'Nouvel Élément', status: 'B', comment: '', photos: []}]} : r)}; setFormData(d); save(d); }} className="w-full py-4 border-2 border-dashed border-slate-100 rounded-3xl text-[9px] font-bold text-slate-300 uppercase tracking-widest hover:border-slate-300 hover:text-slate-900 transition-all">+ Ajouter Élément</button>
                                        </div>
                                    </div>
                                ))}
                            </section>
                        )}

                        {step === 3 && (
                            <section className="space-y-10 animate-in slide-in-from-bottom-4">
                                <h2 className="text-3xl font-black italic uppercase tracking-tight">Signatures</h2>
                                <div className="space-y-8">
                                    <SignaturePad label="Le Bailleur" savedImage={formData.signatures.owner} onSave={img => { const d = {...formData, signatures: {...formData.signatures, owner: img}}; setFormData(d); save(d); }} />
                                    <SignaturePad label="Le Locataire" savedImage={formData.signatures.tenant} onSave={img => { const d = {...formData, signatures: {...formData.signatures, tenant: img}}; setFormData(d); save(d); }} />
                                </div>
                            </section>
                        )}
                    </main>

                    <footer className="fixed bottom-10 inset-x-6 no-print z-40">
                        <div className="max-w-xl mx-auto flex gap-4">
                            {step > 1 && <button onClick={() => setStep(step - 1)} className="w-16 h-16 bg-white border rounded-full flex items-center justify-center font-bold shadow-xl">←</button>}
                            <button onClick={() => step < 3 ? setStep(step + 1) : window.print()} className="flex-1 h-16 bg-slate-900 text-white rounded-[2rem] font-black uppercase text-[10px] tracking-widest shadow-2xl active:scale-95 transition-transform">
                                {step === 3 ? 'Générer le PDF' : 'Suivant'}
                            </button>
                        </div>
                    </footer>

                    {isProcessing && (
                        <div className="fixed inset-0 bg-white/80 backdrop-blur-md z-[1000] flex flex-col items-center justify-center space-y-4">
                            <div className="w-10 h-10 border-4 border-slate-900 border-t-transparent rounded-full animate-spin" />
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Optimisation Image...</p>
                        </div>
                    )}

                    {shareModal && (
                         <div className="fixed inset-0 z-[100] flex items-end justify-center sm:items-center p-4">
                            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setShareModal(null)}></div>
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 relative animate-slide-up shadow-2xl">
                                <h4 className="text-[10px] font-black uppercase tracking-widest mb-4">Lien de partage direct</h4>
                                <div className="space-y-4">
                                    <input readOnly value={shareModal} className="w-full bg-slate-50 p-4 rounded-2xl text-[10px] font-mono outline-none border border-slate-100" />
                                    <button onClick={() => {
                                        const el = document.createElement('textarea');
                                        el.value = shareModal;
                                        document.body.appendChild(el);
                                        el.select();
                                        document.execCommand('copy');
                                        document.body.removeChild(el);
                                        setShareModal(null);
                                    }} className="w-full bg-slate-900 text-white p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Copier le lien</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ZONE D'IMPRESSION PDF */}
                    <div className="hidden print:block p-12 bg-white" id="print-zone">
                        <div className="flex justify-between items-start border-b-8 border-slate-900 pb-8 mb-12">
                            <div>
                                <h1 className="text-5xl font-black italic tracking-tighter uppercase">Immo-Alex's</h1>
                                <p className="text-slate-400 uppercase text-[10px] font-bold tracking-[0.3em] mt-2">État des lieux certifié</p>
                            </div>
                            <div className="text-right">
                                <p className="text-3xl font-light">{formData.property.date}</p>
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-12 mb-16">
                            <div><h4 className="text-[9px] font-black uppercase text-slate-300 mb-2">Adresse</h4><p className="font-bold text-xl">{formData.property.address}</p></div>
                            <div className="grid grid-cols-2 gap-4">
                                <div><h4 className="text-[9px] font-black uppercase text-slate-300 mb-2">Bailleur</h4><p className="font-bold">{formData.property.owner}</p></div>
                                <div><h4 className="text-[9px] font-black uppercase text-slate-300 mb-2">Locataire</h4><p className="font-bold">{formData.property.tenant}</p></div>
                            </div>
                        </div>
                        <div className="space-y-12">
                            {formData.rooms.map(room => (
                                <div key={room.id} className="break-inside-avoid">
                                    <h2 className="text-xl font-black uppercase bg-slate-100 p-4 rounded-xl mb-4">{room.name}</h2>
                                    <table className="w-full text-left">
                                        <thead><tr className="border-b-2 border-slate-900"><th className="py-2 text-[10px] uppercase">Élément</th><th className="py-2 text-[10px] uppercase text-center">État</th><th className="py-2 text-[10px] uppercase">Observations</th></tr></thead>
                                        <tbody>
                                            {room.elements.map(el => (
                                                <tr key={el.id} className="border-b border-slate-100">
                                                    <td className="py-6">
                                                        <span className="font-bold">{el.label}</span>
                                                        <div className="flex flex-wrap gap-2 mt-4">
                                                            {el.photos?.map((ph, idx) => <img key={idx} src={ph} className="w-32 h-32 object-cover rounded-lg border shadow-sm" />)}
                                                        </div>
                                                    </td>
                                                    <td className="py-6 text-center font-black">{el.status}</td>
                                                    <td className="py-6 italic text-sm text-slate-500">{el.comment || 'RAS'}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            ))}
                        </div>
                        <div className="mt-32 grid grid-cols-2 gap-20 border-t pt-12 break-inside-avoid">
                            <div className="text-center space-y-4">
                                <p className="text-[10px] font-black uppercase">Le Bailleur</p>
                                {formData.signatures.owner && <img src={formData.signatures.owner} className="h-32 mx-auto object-contain" />}
                                <p className="font-bold border-t pt-2">{formData.property.owner}</p>
                            </div>
                            <div className="text-center space-y-4">
                                <p className="text-[10px] font-black uppercase">Le Locataire</p>
                                {formData.signatures.tenant && <img src={formData.signatures.tenant} className="h-32 mx-auto object-contain" />}
                                <p className="font-bold border-t pt-2">{formData.property.tenant}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immo-Alex's - Gestionnaire d'État des Lieux</title>
    <!-- Bibliothèques UI & Logique -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Intégration Firebase Cloud -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = window.__app_id || 'immo-alex-elite-v1';

        window.FB_SERVICES = { auth, db, appId, signInAnonymously, signInWithCustomToken, onAuthStateChanged, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc, serverTimestamp };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        .print-only { display: none; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Fonction de secours pour télécharger le fichier index.html
        const downloadIndexFile = () => {
            const htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'index.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        // --- COMPOSANT SIGNATURE ---
        const SignatureBox = ({ label, onSave, savedImage }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                if (savedImage || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.strokeStyle = '#000000'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
                
                const getPos = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const t = e.touches ? e.touches[0] : e;
                    return { 
                        x: (t.clientX - rect.left) * (canvas.width / rect.width),
                        y: (t.clientY - rect.top) * (canvas.height / rect.height)
                    };
                };

                const start = (e) => { setIsDrawing(true); const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
                const move = (e) => { if (!isDrawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
                const stop = () => setIsDrawing(false);

                canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move);
                window.addEventListener('mouseup', stop);
                canvas.addEventListener('touchstart', start, { passive: false }); canvas.addEventListener('touchmove', move, { passive: false });
                return () => { canvas.removeEventListener('mousedown', start); window.removeEventListener('mouseup', stop); };
            }, [savedImage]);

            return (
                <div className="space-y-3">
                    <div className="flex justify-between items-center">
                        <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">{label}</span>
                        {savedImage && <button onClick={() => onSave(null)} className="text-rose-500 text-[10px] font-bold uppercase">Effacer</button>}
                    </div>
                    <div className="h-44 bg-white rounded-3xl border border-slate-200 shadow-sm relative overflow-hidden group">
                        {savedImage ? <img src={savedImage} className="w-full h-full object-contain p-4" /> : <canvas ref={canvasRef} width={600} height={300} className="w-full h-full" />}
                        {!savedImage && <button onClick={() => onSave(canvasRef.current.toDataURL())} className="absolute bottom-4 right-4 bg-slate-900 text-white px-6 py-2 rounded-full text-[10px] font-bold uppercase shadow-lg">Valider la signature</button>}
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('list');
            const [reports, setReports] = useState([]);
            const [currentId, setCurrentId] = useState(null);
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);

            const [formData, setFormData] = useState({
                property: { address: '', owner: '', tenant: '', date: new Date().toLocaleDateString('fr-FR') },
                rooms: [{ id: 1, name: 'Entrée', elements: [{ id: 101, label: 'Porte', status: 'B', comment: '', photos: [] }] }],
                signatures: { owner: null, tenant: null }
            });

            // Initialisation Auth
            useEffect(() => {
                const checkFS = setInterval(() => {
                    if (window.FB_SERVICES) {
                        clearInterval(checkFS);
                        const { auth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } = window.FB_SERVICES;
                        const init = async () => {
                            try {
                                if (window.__initial_auth_token) await signInWithCustomToken(auth, window.__initial_auth_token);
                                else await signInAnonymously(auth);
                            } catch (e) { await signInAnonymously(auth); }
                        };
                        init();
                        onAuthStateChanged(auth, u => { setUser(u); if(!u) setLoading(false); });
                    }
                }, 100);
            }, []);

            // Synchronisation Temps Réel
            useEffect(() => {
                if (!user || !window.FB_SERVICES) return;
                const { db, appId, collection, onSnapshot } = window.FB_SERVICES;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'reports');
                return onSnapshot(q, (s) => {
                    setReports(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                }, () => setLoading(false));
            }, [user]);

            const save = async (data = formData) => {
                if (!user) return;
                setIsSaving(true);
                const { db, appId, doc, setDoc, addDoc, serverTimestamp, collection } = window.FB_SERVICES;
                try {
                    const payload = { ...data, updatedAt: serverTimestamp() };
                    if (currentId) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', currentId), payload);
                    } else {
                        const res = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), payload);
                        setCurrentId(res.id);
                    }
                } finally { setIsSaving(false); }
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-black uppercase text-[10px] animate-pulse tracking-widest">Initialisation Cloud...</div>;

            if (view === 'list') return (
                <div className="max-w-xl mx-auto p-6 space-y-10">
                    <button onClick={downloadIndexFile} className="no-print fixed top-6 right-6 bg-emerald-600 text-white px-5 py-2.5 rounded-full text-[10px] font-black uppercase shadow-2xl hover:bg-emerald-700 transition-all z-[9999]">
                        💾 Sauvegarder index.html sur PC
                    </button>

                    <header className="pt-10">
                        <h1 className="text-5xl font-black italic uppercase tracking-tighter">Mes Dossiers</h1>
                        <p className="text-[10px] font-black uppercase text-slate-400 tracking-[0.3em]">Immo-Alex Elite Edition</p>
                    </header>
                    
                    <div className="grid gap-4">
                        {reports.map(r => (
                            <div key={r.id} onClick={() => { setFormData(r); setCurrentId(r.id); setView('editor'); setStep(1); }} className="bg-white p-6 rounded-[2.5rem] border border-slate-100 flex justify-between items-center cursor-pointer shadow-sm hover:shadow-md transition-all group">
                                <div>
                                    <h3 className="font-bold uppercase text-sm group-hover:text-emerald-600 transition-colors">{r.property?.address || 'Sans adresse'}</h3>
                                    <p className="text-[10px] text-slate-400 uppercase font-medium">{r.property?.date} • {r.property?.tenant}</p>
                                </div>
                                <button onClick={(e) => { e.stopPropagation(); if(confirm("Supprimer ce dossier définitivement ?")) window.FB_SERVICES.deleteDoc(window.FB_SERVICES.doc(window.FB_SERVICES.db, window.FB_SERVICES.appId, 'public', 'data', 'reports', r.id)); }} className="text-slate-200 hover:text-rose-500 p-2">×</button>
                            </div>
                        ))}
                        <button onClick={() => { setCurrentId(null); setView('editor'); setStep(1); setFormData({ property: { address: '', owner: '', tenant: '', date: new Date().toLocaleDateString('fr-FR') }, rooms: [{ id: 1, name: 'Entrée', elements: [{ id: 101, label: 'Porte', status: 'B', comment: '', photos: [] }] }], signatures: { owner: null, tenant: null } }); }} className="w-full py-12 border-4 border-dashed rounded-[3rem] text-[10px] font-black uppercase tracking-widest text-slate-300 hover:text-slate-900 hover:border-slate-900 transition-all">+ Nouveau Dossier</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-white">
                    <header className="fixed top-0 inset-x-0 h-16 bg-white/80 backdrop-blur-md border-b z-50 flex items-center justify-between px-6 no-print">
                        <button onClick={() => setView('list')} className="text-slate-400 font-bold uppercase text-[10px] hover:text-slate-900">Retour</button>
                        <div className="text-center">
                            <h2 className="text-[10px] font-black uppercase tracking-widest">Dossier en cours</h2>
                            <span className={`text-[8px] font-bold uppercase ${isSaving ? 'text-blue-500' : 'text-emerald-500'}`}>{isSaving ? 'Synchronisation...' : 'Sauvegardé'}</span>
                        </div>
                        <button onClick={() => window.print()} className="bg-slate-900 text-white px-5 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest shadow-lg">Générer PDF</button>
                    </header>

                    <main className="max-w-xl mx-auto pt-24 pb-40 px-6 no-print space-y-12">
                        {step === 1 && (
                            <div className="space-y-6">
                                <h3 className="text-4xl font-black italic uppercase tracking-tighter">Le Bien</h3>
                                <div className="space-y-4 bg-slate-50 p-6 rounded-[2rem]">
                                    <textarea className="w-full p-4 rounded-2xl border-none font-bold text-lg bg-white shadow-sm focus:ring-2 ring-emerald-500/20 outline-none" placeholder="Adresse complète..." value={formData.property.address} onChange={e => setFormData({...formData, property:{...formData.property, address: e.target.value}})} onBlur={() => save()} />
                                    <input className="w-full p-4 rounded-2xl border-none font-bold bg-white shadow-sm focus:ring-2 ring-emerald-500/20 outline-none" placeholder="Propriétaire" value={formData.property.owner} onChange={e => setFormData({...formData, property:{...formData.property, owner: e.target.value}})} onBlur={() => save()} />
                                    <input className="w-full p-4 rounded-2xl border-none font-bold bg-white shadow-sm focus:ring-2 ring-emerald-500/20 outline-none" placeholder="Locataire" value={formData.property.tenant} onChange={e => setFormData({...formData, property:{...formData.property, tenant: e.target.value}})} onBlur={() => save()} />
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center px-2">
                                    <h3 className="text-4xl font-black italic uppercase tracking-tighter">Inventaire</h3>
                                    <button onClick={() => { const d = {...formData, rooms:[...formData.rooms, {id: Date.now(), name:'Nouvelle Pièce', elements:[{id: Date.now()+1, label:'Élément', status:'B', comment:'', photos:[]}]}]}; setFormData(d); save(d); }} className="bg-slate-900 text-white w-12 h-12 rounded-2xl flex items-center justify-center font-bold shadow-xl active:scale-90 transition-all">+</button>
                                </div>
                                {formData.rooms.map(room => (
                                    <div key={room.id} className="bg-slate-50 p-6 rounded-[2rem] space-y-4">
                                        <div className="flex justify-between items-center">
                                            <input className="font-black text-xl uppercase bg-transparent w-full outline-none focus:text-emerald-600" value={room.name} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, name: e.target.value} : r)})} onBlur={() => save()} />
                                            <button onClick={() => { if(confirm("Supprimer cette pièce ?")) { const d = {...formData, rooms: formData.rooms.filter(r => r.id !== room.id)}; setFormData(d); save(d); }}} className="text-slate-300 hover:text-rose-500 transition-colors">×</button>
                                        </div>
                                        <div className="space-y-3">
                                            {room.elements.map(el => (
                                                <div key={el.id} className="bg-white p-5 rounded-[1.5rem] shadow-sm space-y-4">
                                                    <input className="font-bold text-xs uppercase text-slate-600 bg-transparent w-full outline-none" value={el.label} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(item => item.id === el.id ? {...item, label: e.target.value} : item)} : r)})} onBlur={() => save()} />
                                                    <div className="flex gap-2">
                                                        {['N','B','M','X'].map(s => (
                                                            <button key={s} onClick={() => { const d = {...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(item => item.id === el.id ? {...item, status: s} : item)} : r)}; setFormData(d); save(d); }} 
                                                            className={`flex-1 py-2.5 rounded-xl text-[10px] font-black transition-all ${el.status === s ? 'bg-slate-900 text-white scale-105 shadow-md' : 'bg-slate-50 text-slate-300'}`}>
                                                                {s === 'N' ? 'NEUF' : s === 'B' ? 'BON' : s === 'M' ? 'MOYEN' : 'DÉGR.'}
                                                            </button>
                                                        ))}
                                                    </div>
                                                    <input className="w-full text-[10px] italic text-slate-400 bg-transparent border-t border-slate-50 pt-3 outline-none focus:text-slate-900" placeholder="Observations spécifiques..." value={el.comment} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(item => item.id === el.id ? {...item, comment: e.target.value} : item)} : r)})} onBlur={() => save()} />
                                                </div>
                                            ))}
                                            <button onClick={() => { const d = {...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: [...r.elements, {id: Date.now(), label:'Nouvel élément', status:'B', comment:'', photos:[]}]} : r)}; setFormData(d); save(d); }} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-[10px] font-bold text-slate-300 uppercase tracking-widest hover:border-slate-400 transition-all">+ Ajouter un élément</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {step === 3 && (
                            <div className="space-y-8">
                                <h3 className="text-4xl font-black italic uppercase tracking-tighter">Signatures</h3>
                                <SignatureBox label="Le Bailleur / Mandataire" savedImage={formData.signatures.owner} onSave={img => { const d = {...formData, signatures:{...formData.signatures, owner:img}}; setFormData(d); save(d); }} />
                                <SignatureBox label="Le Locataire / Occupant" savedImage={formData.signatures.tenant} onSave={img => { const d = {...formData, signatures:{...formData.signatures, tenant:img}}; setFormData(d); save(d); }} />
                                <div className="p-6 bg-slate-900 text-white/70 rounded-[2rem] text-[10px] font-bold uppercase tracking-widest leading-relaxed">
                                    En validant ce document, les parties certifient l'exactitude des constatations effectuées lors de la visite.
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-8 inset-x-6 no-print z-50">
                        <div className="max-w-xl mx-auto flex gap-4">
                            {step > 1 && <button onClick={() => setStep(step - 1)} className="bg-white border w-16 h-16 rounded-full flex items-center justify-center font-bold shadow-xl active:scale-90 transition-all text-slate-400">←</button>}
                            <button onClick={() => step < 3 ? setStep(step + 1) : window.print()} className="flex-1 bg-slate-900 text-white rounded-[2rem] font-black uppercase text-[11px] tracking-[0.3em] h-16 shadow-2xl active:scale-95 transition-all">
                                {step === 3 ? 'Finaliser et Imprimer' : 'Étape Suivante'}
                            </button>
                        </div>
                    </footer>

                    {/* RENDU IMPRESSION PDF */}
                    <div className="print-only p-12 bg-white text-black">
                        <div className="flex justify-between items-start border-b-4 border-black pb-8 mb-12">
                            <div>
                                <h1 className="text-4xl font-black italic uppercase tracking-tighter">État des Lieux Elite</h1>
                                <p className="text-[10px] font-black uppercase text-gray-400 tracking-widest mt-1">Document Certifié</p>
                            </div>
                            <p className="text-right font-black text-sm uppercase">Date: {formData.property.date}</p>
                        </div>
                        <div className="grid grid-cols-2 gap-12 mb-16">
                            <div className="space-y-3">
                                <p className="text-[10px] uppercase font-black text-gray-400 tracking-widest">Localisation du bien</p>
                                <p className="font-black text-xl leading-tight uppercase">{formData.property.address}</p>
                            </div>
                            <div className="grid grid-cols-1 gap-6">
                                <div><p className="text-[10px] uppercase font-black text-gray-400 tracking-widest">Bailleur</p><p className="font-black uppercase">{formData.property.owner}</p></div>
                                <div><p className="text-[10px] uppercase font-black text-gray-400 tracking-widest">Locataire</p><p className="font-black uppercase">{formData.property.tenant}</p></div>
                            </div>
                        </div>
                        {formData.rooms.map(r => (
                            <div key={r.id} className="mb-10 break-inside-avoid">
                                <h3 className="font-black uppercase bg-gray-100 p-4 mb-4 text-xs tracking-[0.2em]">{r.name}</h3>
                                <table className="w-full text-left">
                                    <thead>
                                        <tr className="border-b-2 border-gray-100">
                                            <th className="py-3 text-[9px] font-black uppercase tracking-widest">Élément</th>
                                            <th className="py-3 text-[9px] font-black uppercase tracking-widest text-center">État</th>
                                            <th className="py-3 text-[9px] font-black uppercase tracking-widest">Observations</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {r.elements.map(el => (
                                            <tr key={el.id} className="border-b border-gray-50">
                                                <td className="py-4 font-black text-[11px] uppercase">{el.label}</td>
                                                <td className="py-4 text-center"><span className="text-[10px] font-black border-2 border-black px-3 py-1">{el.status}</span></td>
                                                <td className="py-4 text-[11px] italic text-gray-600">{el.comment || '-'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        ))}
                        <div className="mt-24 grid grid-cols-2 gap-20 border-t-2 border-black pt-12">
                            <div className="text-center space-y-12">
                                <p className="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Signature Bailleur</p>
                                {formData.signatures.owner && <img src={formData.signatures.owner} className="h-40 mx-auto object-contain" />}
                                <p className="font-black uppercase pt-6 text-sm">{formData.property.owner}</p>
                            </div>
                            <div className="text-center space-y-12">
                                <p className="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Signature Locataire</p>
                                {formData.signatures.tenant && <img src={formData.signatures.tenant} className="h-40 mx-auto object-contain" />}
                                <p className="font-black uppercase pt-6 text-sm">{formData.property.tenant}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APPART-ALEX'S | État des Lieux Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .signature-canvas { touch-action: none; cursor: crosshair; }
        
        /* Styles spécifiques pour l'impression (Génération PDF Pro) */
        @media print {
            @page { size: A4; margin: 15mm; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; padding: 0; margin: 0; font-size: 11pt; }
            #app-container { box-shadow: none !important; border: none !important; max-width: 100% !important; width: 100% !important; margin: 0 !important; }
            #main-content { padding: 0 !important; display: block !important; }
            
            /* On force l'affichage séquentiel de toutes les sections */
            #step-container-1, #step-container-2, #step-container-3, #step-container-4 {
                display: block !important;
                opacity: 1 !important;
                visibility: visible !important;
                page-break-after: auto;
            }

            .print-card { 
                border: none !important;
                border-bottom: 1px solid #eee !important;
                break-inside: avoid; 
                margin-bottom: 30px; 
                padding: 0 !important; 
                background: white !important;
            }
            
            .photo-grid { 
                display: grid !important; 
                grid-template-columns: repeat(3, 1fr) !important; 
                gap: 8px; 
                margin-top: 12px; 
            }
            .photo-preview { 
                width: 100% !important; 
                height: 120px !important; 
                object-fit: cover !important;
                border: 0.5px solid #ddd !important;
                border-radius: 4px !important;
            }

            h1, h2, h3 { color: black !important; text-transform: uppercase !important; }
            input, textarea, select { 
                border: none !important; 
                background: transparent !important; 
                appearance: none !important; 
                font-weight: 600 !important;
                padding: 2px 0 !important;
                width: 100% !important;
                color: #000 !important;
            }
            textarea { height: auto !important; min-height: 20px !important; }
            
            .status-badge {
                font-weight: 900 !important;
                font-size: 9pt !important;
                border: 1px solid #000 !important;
                padding: 1px 6px !important;
                border-radius: 2px !important;
                text-transform: uppercase;
            }
            .inv-count { font-weight: 900 !important; font-size: 11pt !important; color: #000 !important; }
            
            /* Entête Pro sur chaque page si possible */
            #header-logo { color: black !important; margin-bottom: 20px; border-bottom: 2px solid black; padding-bottom: 10px; }
        }
        
        .photo-preview { width: 64px; height: 64px; object-fit: cover; border-radius: 12px; border: 1px solid #e2e8f0; }
        .print-only { display: none; }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div id="app-container" class="max-w-2xl mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative">
        
        <!-- HEADER -->
        <header class="bg-slate-900 text-white p-5 sticky top-0 z-50 flex justify-between items-center no-print">
            <button id="back-btn" class="p-2 hover:bg-slate-800 rounded-xl transition-colors hidden">
                <i data-lucide="chevron-left"></i>
            </button>
            <div id="header-logo" class="text-center flex-1">
                <span class="font-black italic uppercase text-xl tracking-tighter">APPART-ALEXIA</span>
            </div>
            <div class="flex gap-2">
                <button onclick="finalizeAndGenerate()" class="p-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-transform active:scale-95" title="Générer le document">
                    <i data-lucide="file-check" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- NAVIGATION ÉTAPES -->
        <nav id="editor-nav" class="flex px-4 py-2 border-b bg-white sticky top-[72px] z-40 no-print overflow-x-auto hidden">
            <button onclick="changeStep(1)" class="nav-step flex-1 flex flex-col items-center gap-1 py-3 text-blue-600" data-step="1">
                <i data-lucide="home" class="w-4 h-4"></i>
                <span class="text-[9px] font-black uppercase tracking-widest">Infos</span>
            </button>
            <button onclick="changeStep(2)" class="nav-step flex-1 flex flex-col items-center gap-1 py-3 text-slate-300" data-step="2">
                <i data-lucide="clipboard-check" class="w-4 h-4"></i>
                <span class="text-[9px] font-black uppercase tracking-widest">Pièces</span>
            </button>
            <button onclick="changeStep(3)" class="nav-step flex-1 flex flex-col items-center gap-1 py-3 text-slate-300" data-step="3">
                <i data-lucide="utensils" class="w-4 h-4"></i>
                <span class="text-[9px] font-black uppercase tracking-widest">Équip.</span>
            </button>
            <button onclick="changeStep(4)" class="nav-step flex-1 flex flex-col items-center gap-1 py-3 text-slate-300" data-step="4">
                <i data-lucide="pen-tool" class="w-4 h-4"></i>
                <span class="text-[9px] font-black uppercase tracking-widest">Signer</span>
            </button>
        </nav>

        <main id="main-content" class="p-6 flex-1 bg-slate-50/50">
            <!-- Injecté par JS -->
        </main>

        <footer id="editor-footer" class="bg-white border-t p-6 flex gap-3 no-print sticky bottom-0 z-50 hidden">
            <button id="step-prev-btn" onclick="prevStep()" class="p-5 bg-slate-50 text-slate-400 rounded-3xl border border-slate-200">
                <i data-lucide="chevron-left"></i>
            </button>
            <button id="step-next-btn" onclick="handleNextAction()" class="flex-1 bg-slate-900 text-white py-5 rounded-3xl font-black uppercase text-xs tracking-[0.2em] shadow-xl flex items-center justify-center gap-2">
                <span id="next-btn-text">Suivant</span> <i id="next-btn-icon" data-lucide="chevron-right" class="w-4 h-4"></i>
            </button>
        </footer>
    </div>

    <script>
        let edlList = JSON.parse(localStorage.getItem('appart_alex_storage') || '[]');
        let currentEdl = null;
        let currentStep = 1;
        let view = 'list';

        const mainContent = document.getElementById('main-content');
        const editorNav = document.getElementById('editor-nav');
        const editorFooter = document.getElementById('editor-footer');
        const backBtn = document.getElementById('back-btn');

        const statusOptions = ["Bon", "Usage", "Mauvais", "HS"];

        function init() {
            render();
            backBtn.onclick = () => { view = 'list'; render(); };
        }

        function render() {
            if (view === 'list') {
                renderList();
                editorNav.classList.add('hidden');
                editorFooter.classList.add('hidden');
                backBtn.classList.add('hidden');
            } else {
                renderEditor();
                editorNav.classList.remove('hidden');
                editorFooter.classList.remove('hidden');
                backBtn.classList.remove('hidden');
                updateStepUI();
            }
            lucide.createIcons();
        }

        function renderList() {
            mainContent.innerHTML = `
                <div class="max-w-xl mx-auto">
                    <div class="flex justify-between items-center mb-10">
                        <h1 class="text-3xl font-black italic uppercase tracking-tighter">Mes Rapports</h1>
                    </div>
                    <button onclick="createNewEdl()" class="w-full bg-slate-900 text-white py-6 rounded-3xl font-black uppercase text-sm shadow-xl flex items-center justify-center gap-3 active:scale-95 mb-10">
                        <i data-lucide="plus"></i> Nouveau Rapport
                    </button>
                    <div class="space-y-4">
                        ${edlList.map((item, index) => `
                            <div onclick="loadEdl(${index})" class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm cursor-pointer flex justify-between items-center hover:bg-slate-50 transition-colors">
                                <div>
                                    <p class="font-black uppercase text-xs">${item.address || 'ADRESSE NON RENSEIGNÉE'}</p>
                                    <p class="text-[10px] font-bold text-slate-400">${item.date} • ${item.tenant || 'Locataire'}</p>
                                </div>
                                <i data-lucide="chevron-right" class="text-slate-300"></i>
                            </div>
                        `).join('')}
                        ${edlList.length === 0 ? '<p class="text-center text-slate-400 py-10">Aucun rapport enregistré</p>' : ''}
                    </div>
                </div>
            `;
        }

        function createNewEdl() {
            currentEdl = {
                id: Date.now(),
                address: "", 
                date: new Date().toLocaleDateString('fr-FR'), 
                owner: "", 
                tenant: "",
                generalComments: "",
                rooms: [{ id: 1, name: "Entrée", elements: [{ id: 101, label: "Porte", status: "Bon", comment: "", photos: [] }] }],
                inventory: [
                    { label: "Cuillères à café", count: 0 }, { label: "Cuillères à soupe", count: 0 },
                    { label: "Fourchettes", count: 0 }, { label: "Couteaux de table", count: 0 },
                    { label: "Assiettes plates", count: 0 }, { label: "Assiettes creuses", count: 0 },
                    { label: "Verres à eau", count: 0 }, { label: "Bols / Mugs", count: 0 },
                    { label: "Casseroles", count: 0 }, { label: "Poêles", count: 0 },
                    { label: "Plats à four", count: 0 }, { label: "Passoire", count: 0 },
                    { label: "Planche à découper", count: 0 }, { label: "Saladiers", count: 0 },
                    { label: "Ustensiles (Louche/Spatule)", count: 0 }
                ],
                signatures: { owner: null, tenant: null }
            };
            view = 'editor'; currentStep = 1; render();
        }

        function loadEdl(index) {
            currentEdl = edlList[index];
            if (!currentEdl.generalComments) currentEdl.generalComments = "";
            view = 'editor'; currentStep = 1; render();
        }

        function changeStep(s) { currentStep = s; render(); }
        
        function handleNextAction() {
            if (currentStep < 4) {
                currentStep++;
                render();
            } else {
                finalizeAndGenerate();
            }
        }

        function prevStep() { if (currentStep > 1) { currentStep--; render(); } }

        function saveData() {
            const idx = edlList.findIndex(e => e.id === currentEdl.id);
            if (idx > -1) edlList[idx] = currentEdl; else edlList.push(currentEdl);
            localStorage.setItem('appart_alex_storage', JSON.stringify(edlList));
        }

        function updateStepUI() {
            document.querySelectorAll('.nav-step').forEach(btn => {
                const s = parseInt(btn.dataset.step);
                btn.classList.toggle('text-blue-600', s === currentStep);
                btn.classList.toggle('text-slate-300', s !== currentStep);
            });
            document.getElementById('step-prev-btn').classList.toggle('invisible', currentStep === 1);
            
            const nextBtnText = document.getElementById('next-btn-text');
            const nextBtnIcon = document.getElementById('next-btn-icon');
            if (currentStep === 4) {
                nextBtnText.innerText = "Générer le Document";
                nextBtnIcon.setAttribute('data-lucide', 'file-check');
            } else {
                nextBtnText.innerText = "Suivant";
                nextBtnIcon.setAttribute('data-lucide', 'chevron-right');
            }

            for(let i=1; i<=4; i++) {
                const stepEl = document.getElementById(`step-container-${i}`);
                if (stepEl) {
                    if (i === currentStep) stepEl.classList.remove('hidden');
                    else stepEl.classList.add('hidden');
                }
            }
            lucide.createIcons();
        }

        function renderEditor() {
            mainContent.innerHTML = `
                <!-- ÉTAPE 1 : INFOS -->
                <div id="step-container-1" class="space-y-6">
                    <div class="bg-white p-8 rounded-[40px] border border-slate-100 print-card">
                        <label class="text-[10px] font-black uppercase text-slate-400 block mb-4">Adresse du bien</label>
                        <input type="text" oninput="currentEdl.address = this.value.toUpperCase(); saveData()" value="${currentEdl.address}" class="w-full text-2xl font-black uppercase outline-none" placeholder="EX: 12 RUE DES ALPES, PARIS">
                        <p class="print-only text-[10px] text-slate-400 mt-2 italic">Date de l'état des lieux : ${currentEdl.date}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white p-6 rounded-3xl border border-slate-100 print-card">
                            <label class="text-[9px] font-black uppercase text-slate-400 block mb-2">Propriétaire</label>
                            <input oninput="currentEdl.owner = this.value; saveData()" value="${currentEdl.owner}" class="w-full font-bold text-sm outline-none" placeholder="Nom">
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-slate-100 print-card">
                            <label class="text-[9px] font-black uppercase text-slate-400 block mb-2">Locataire</label>
                            <input oninput="currentEdl.tenant = this.value; saveData()" value="${currentEdl.tenant}" class="w-full font-bold text-sm outline-none" placeholder="Nom">
                        </div>
                    </div>
                </div>

                <!-- ÉTAPE 2 : PIÈCES -->
                <div id="step-container-2" class="space-y-6 hidden">
                    ${currentEdl.rooms.map((room, rIdx) => `
                        <div class="bg-white rounded-[40px] p-8 border border-slate-100 shadow-sm print-card">
                            <div class="flex justify-between items-center mb-6">
                                <input class="text-xl font-black uppercase outline-none w-2/3" value="${room.name}" oninput="currentEdl.rooms[${rIdx}].name = this.value; saveData()">
                                <button onclick="addElement(${rIdx})" class="p-2 bg-blue-50 text-blue-600 rounded-xl no-print"><i data-lucide="plus"></i></button>
                            </div>
                            <div class="space-y-6">
                                ${room.elements.map((el, eIdx) => `
                                    <div class="bg-slate-50 p-6 rounded-3xl border border-transparent print:bg-white print:border-b print:border-slate-100 print:rounded-none print:px-0">
                                        <div class="flex justify-between items-center mb-4">
                                            <input class="bg-transparent font-bold text-sm uppercase outline-none" value="${el.label}" oninput="currentEdl.rooms[${rIdx}].elements[${eIdx}].label = this.value; saveData()">
                                            <div class="flex items-center gap-2">
                                                <span class="print-only status-badge">${el.status}</span>
                                                <select onchange="currentEdl.rooms[${rIdx}].elements[${eIdx}].status = this.value; saveData()" class="text-[10px] font-black uppercase bg-white px-2 py-1 rounded-lg border outline-none cursor-pointer no-print">
                                                    ${statusOptions.map(opt => `<option value="${opt}" ${el.status === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                                                </select>
                                            </div>
                                        </div>
                                        <textarea class="w-full bg-white border border-slate-100 p-3 rounded-xl text-xs text-slate-600 outline-none mb-4 resize-none print:p-0 print:border-none print:text-black" placeholder="Observations..." oninput="currentEdl.rooms[${rIdx}].elements[${eIdx}].comment = this.value; saveData()">${el.comment || ''}</textarea>
                                        <div class="flex gap-2 flex-wrap photo-grid">
                                            ${(el.photos || []).map((pic, pIdx) => `
                                                <div class="relative group">
                                                    <img src="${pic}" class="photo-preview shadow-sm">
                                                    <button onclick="removePhoto(${rIdx}, ${eIdx}, ${pIdx})" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 no-print shadow-lg"><i data-lucide="x" class="w-3 h-3"></i></button>
                                                </div>
                                            `).join('')}
                                            <label class="w-[60px] h-[60px] bg-white border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-center text-slate-300 cursor-pointer no-print">
                                                <i data-lucide="camera" class="w-4 h-4"></i>
                                                <input type="file" accept="image/*" capture="camera" class="hidden" onchange="handlePhoto(event, ${rIdx}, ${eIdx})">
                                            </label>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                    <button onclick="addRoom()" class="w-full py-6 border-4 border-dashed border-slate-200 rounded-[40px] font-black uppercase text-slate-300 no-print hover:border-blue-200 hover:text-blue-200 transition-colors">+ Ajouter une pièce</button>
                </div>

                <!-- ÉTAPE 3 : ÉQUIPEMENTS -->
                <div id="step-container-3" class="space-y-4 hidden">
                    <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-widest px-2 mb-4">Inventaire détaillé des équipements</h3>
                    <div class="grid grid-cols-1 gap-3">
                        ${currentEdl.inventory.map((item, iIdx) => `
                            <div class="bg-white p-6 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm print-card print:p-2">
                                <input class="font-bold uppercase text-sm outline-none" value="${item.label}" oninput="currentEdl.inventory[iIdx].label = this.value; saveData()">
                                <div class="flex items-center gap-4">
                                    <button onclick="updateInv(${iIdx}, -1)" class="w-8 h-8 rounded-full bg-slate-50 border no-print">-</button>
                                    <span class="font-black text-sm inv-count">${item.count}</span>
                                    <button onclick="updateInv(${iIdx}, 1)" class="w-8 h-8 rounded-full bg-slate-900 text-white shadow-md no-print">+</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="addInventoryItem()" class="w-full py-5 bg-white rounded-3xl border border-slate-100 font-black uppercase text-[10px] text-slate-400 no-print">+ Ajouter un élément</button>
                </div>

                <!-- ÉTAPE 4 : SIGNATURES -->
                <div id="step-container-4" class="space-y-8 hidden">
                    <div class="bg-white p-8 rounded-[40px] border border-slate-100 shadow-sm print-card">
                        <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4">Observations Finales & Remarques</h3>
                        <textarea oninput="currentEdl.generalComments = this.value; saveData()" class="w-full bg-slate-50 p-5 rounded-3xl text-sm outline-none border border-slate-100 min-h-[120px] resize-none print:bg-white print:p-0 print:text-black" placeholder="Indiquez ici d'éventuels commentaires globaux...">${currentEdl.generalComments || ''}</textarea>
                    </div>

                    <div class="bg-white p-8 rounded-[40px] border border-slate-100 shadow-sm print-card">
                        <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-6">Validation et Signatures</h3>
                        <div class="grid grid-cols-2 gap-8">
                            ${['owner', 'tenant'].map(id => `
                                <div>
                                    <div class="flex justify-between mb-2">
                                        <span class="text-[9px] font-black uppercase text-slate-400">${id === 'owner' ? 'Signature Propriétaire' : 'Signature Locataire'}</span>
                                        <button onclick="clearSign('${id}')" class="text-[9px] font-bold text-red-500 uppercase no-print">Effacer</button>
                                    </div>
                                    <div class="bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl h-44 relative overflow-hidden print:border-solid print:border-slate-300 print:bg-white">
                                        <canvas id="sign-${id}" class="signature-canvas w-full h-full no-print"></canvas>
                                        <img id="img-${id}" src="${currentEdl.signatures[id] || ''}" class="absolute inset-0 w-full h-full object-contain pointer-events-none ${currentEdl.signatures[id] ? '' : 'hidden'}">
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <p class="text-[8px] text-center text-slate-300 uppercase font-bold tracking-[0.3em] mt-10 print-only">Document généré via APPART-ALEXIA Pro Edition</p>
                </div>
            `;
            updateStepUI();
            setTimeout(() => { initSignPad('owner'); initSignPad('tenant'); }, 100);
        }

        function addElement(rIdx) {
            currentEdl.rooms[rIdx].elements.push({ id: Date.now(), label: "Nouvel élément", status: "Bon", comment: "", photos: [] });
            saveData(); render();
        }

        function addRoom() {
            currentEdl.rooms.push({ id: Date.now(), name: "Nouvelle Pièce", elements: [] });
            saveData(); render();
        }

        function handlePhoto(e, rIdx, eIdx) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                if (!currentEdl.rooms[rIdx].elements[eIdx].photos) currentEdl.rooms[rIdx].elements[eIdx].photos = [];
                currentEdl.rooms[rIdx].elements[eIdx].photos.push(ev.target.result);
                saveData(); render();
            };
            reader.readAsDataURL(file);
        }

        function removePhoto(rIdx, eIdx, pIdx) {
            currentEdl.rooms[rIdx].elements[eIdx].photos.splice(pIdx, 1);
            saveData(); render();
        }

        function updateInv(idx, val) {
            currentEdl.inventory[idx].count = Math.max(0, currentEdl.inventory[idx].count + val);
            saveData(); render();
        }

        function addInventoryItem() {
            currentEdl.inventory.push({ label: "Nouvel objet", count: 0 });
            saveData(); render();
        }

        function clearSign(id) { currentEdl.signatures[id] = null; saveData(); render(); }

        /**
         * Optimisation Pro : Déclenche l'impression (PDF)
         * Le CSS s'occupe de rendre le document complet et propre.
         */
        function finalizeAndGenerate() {
            if (!currentEdl) return;
            saveData();
            // On s'assure que tout est rendu avant l'impression
            render(); 
            // Appel de l'impression système (qui permet de sauvegarder en PDF)
            window.print();
        }

        function initSignPad(id) {
            const canvas = document.getElementById(`sign-${id}`);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let isDrawing = false;
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const cx = (e.touches ? e.touches[0].clientX : e.clientX);
                const cy = (e.touches ? e.touches[0].clientY : e.clientY);
                return { x: cx - rect.left, y: cy - rect.top };
            };

            const start = (e) => { isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.strokeStyle = '#000000'; ctx.lineWidth = 2; };
            const move = (e) => { if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            const stop = () => { if (!isDrawing) return; isDrawing = false; currentEdl.signatures[id] = canvas.toDataURL(); const img = document.getElementById(`img-${id}`); img.src = currentEdl.signatures[id]; img.classList.remove('hidden'); saveData(); };

            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); }); canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); }); canvas.addEventListener('touchend', stop);
        }

        window.onload = init;
    </script>
</body>
</html>

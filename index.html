<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Immo-Alex | Cloud & PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; margin: 0; padding: 0; }
            .room-section { break-inside: avoid; border-left: 2px solid #000 !important; margin-bottom: 20px; padding-left: 15px; }
            .signature-container { break-inside: avoid; margin-top: 30px; }
            .max-w-3xl { max-width: 100% !important; width: 100% !important; box-shadow: none !important; }
        }
        
        body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .signature-pad { border: 2px dashed #cbd5e1; background: #fff; touch-action: none; cursor: crosshair; }
        
        .status-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .online { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .offline { background-color: #ef4444; }

        /* Animation de chargement */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="h-screen flex flex-col items-center justify-center text-slate-400 font-medium">
            <div class="loader mb-4"></div>
            Chargement de l'interface Immo-Alex...
        </div>
    </div>

    <!-- Script de démarrage unifié -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Initialisation sécurisée
        const startApp = () => {
            try {
                const config = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
                const app = initializeApp(config);
                const auth = getAuth(app);
                const db = getFirestore(app);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'immo-alex-default';

                // On expose les services pour le script Babel
                window.FirebaseSDK = { 
                    auth, db, appId, doc, setDoc, collection, onSnapshot, 
                    signInAnonymously, onAuthStateChanged, signInWithCustomToken 
                };
                
                // On prévient React que Firebase est prêt
                window.dispatchEvent(new Event('firebase-ready'));
            } catch (e) {
                console.error("Erreur d'initialisation :", e);
                document.getElementById('root').innerHTML = `
                    <div class="p-8 text-center">
                        <h1 class="text-red-500 font-bold">Erreur de configuration</h1>
                        <p class="text-sm text-slate-500 mt-2">${e.message}</p>
                    </div>
                `;
            }
        };

        // On attend que le DOM soit prêt
        if (document.readyState === 'complete') {
            startApp();
        } else {
            window.addEventListener('load', startApp);
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONES ---
        const IconShare = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>;

        // --- COMPOSANT SIGNATURE ---
        const SignaturePad = ({ label, onSave, savedImage }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            const getPos = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => {
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                setIsDrawing(true);
            };

            const move = (e) => {
                if (!isDrawing) return;
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            };

            const stop = () => {
                if (!isDrawing) return;
                setIsDrawing(false);
                onSave(canvasRef.current.toDataURL());
            };

            return (
                <div className="mb-4 signature-container">
                    <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">{label}</label>
                    <div className="relative">
                        <canvas 
                            ref={canvasRef} width={400} height={150}
                            className={`signature-pad w-full h-32 rounded-lg ${savedImage ? 'print:hidden' : ''}`}
                            onMouseDown={start} onMouseMove={move} onMouseUp={stop}
                            onTouchStart={start} onTouchMove={move} onTouchEnd={stop}
                        />
                        {savedImage && <img src={savedImage} className="hidden print:block w-full h-32 object-contain border rounded-lg" />}
                    </div>
                </div>
            );
        };

        function App() {
            const [fb, setFb] = useState(window.FirebaseSDK);
            const [step, setStep] = useState(1);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [user, setUser] = useState(null);
            const [syncStatus, setSyncStatus] = useState('idle');
            
            const [formData, setFormData] = useState({
                address: "",
                date: new Date().toLocaleDateString('fr-FR'),
                owner: "",
                tenant: "",
                rooms: [
                    { id: 1, name: 'Entrée', elements: [{ id: 101, label: 'Porte', status: 'Bon', comment: '', photos: [] }] }
                ],
                signatures: { owner: null, tenant: null }
            });

            // Écouter l'initialisation Firebase
            useEffect(() => {
                const checkFb = () => { if(window.FirebaseSDK) setFb(window.FirebaseSDK); };
                window.addEventListener('firebase-ready', checkFb);
                return () => window.removeEventListener('firebase-ready', checkFb);
            }, []);

            // Authentification
            useEffect(() => {
                if (!fb) return;
                
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await fb.signInWithCustomToken(fb.auth, __initial_auth_token);
                        } else {
                            await fb.signInAnonymously(fb.auth);
                        }
                    } catch (e) { console.error("Auth error", e); }
                };
                
                initAuth();
                const unsub = fb.onAuthStateChanged(fb.auth, (u) => setUser(u));
                return () => unsub();
            }, [fb]);

            // Synchronisation
            useEffect(() => {
                if (!fb || !user || !isOnline) return;
                const timer = setTimeout(async () => {
                    setSyncStatus('syncing');
                    try {
                        const docRef = fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'edl', 'current');
                        await fb.setDoc(docRef, { ...formData, lastUpdated: new Date().toISOString() }, { merge: true });
                        setSyncStatus('saved');
                    } catch (e) { 
                        setSyncStatus('idle'); 
                    }
                }, 2000);
                return () => clearTimeout(timer);
            }, [formData, user, isOnline, fb]);

            if (!fb) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center text-slate-400 font-medium">
                        <div className="loader mb-4"></div>
                        Connexion aux services de données...
                    </div>
                );
            }

            const addRoom = () => {
                setFormData({...formData, rooms: [...formData.rooms, { id: Date.now(), name: 'Nouvelle pièce', elements: [] }]});
            };

            const addElement = (roomId) => {
                setFormData({
                    ...formData,
                    rooms: formData.rooms.map(r => r.id === roomId ? {
                        ...r, elements: [...r.elements, { id: Date.now(), label: 'Nouvel élément', status: 'Bon', comment: '', photos: [] }]
                    } : r)
                });
            };

            return (
                <div className="max-w-3xl mx-auto bg-white min-h-screen shadow-xl flex flex-col">
                    <header className="no-print bg-slate-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center">
                        <div className="flex flex-col">
                            <span className="text-xl font-black italic tracking-tighter">IMMO-ALEX</span>
                            <div className="flex items-center mt-1">
                                <span className={`status-pulse ${isOnline ? 'online' : 'offline'}`}></span>
                                <span className="text-[10px] font-bold uppercase text-slate-400">
                                    {isOnline ? (syncStatus === 'syncing' ? 'Sync...' : 'Cloud OK') : 'Hors ligne'}
                                </span>
                            </div>
                        </div>
                        <button onClick={() => window.print()} className="p-3 bg-white/10 rounded-full hover:bg-white/20 transition-colors">
                            <IconShare />
                        </button>
                    </header>

                    <nav className="no-print flex border-b bg-white">
                        {[1, 2, 3].map(n => (
                            <button key={n} onClick={() => setStep(n)} className={`flex-1 py-4 text-[10px] font-black uppercase tracking-widest transition-all ${step === n ? 'text-blue-600 border-b-4 border-blue-600 bg-blue-50/30' : 'text-slate-400'}`}>
                                {n === 1 ? 'Propriété' : n === 2 ? 'Inventaire' : 'Signatures'}
                            </button>
                        ))}
                    </nav>

                    <main className="p-6 flex-1">
                        <div className="hidden print:block border-b-4 border-black pb-4 mb-6">
                            <h1 className="text-3xl font-black italic uppercase">État des Lieux Contradictoire</h1>
                            <p className="font-bold mt-2">Date : {formData.date}</p>
                        </div>

                        {step === 1 && (
                            <div className="space-y-6">
                                <div className="p-4 bg-slate-50 rounded-xl border">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Adresse du Bien</label>
                                    <input type="text" className="w-full bg-transparent text-xl font-bold outline-none border-b border-transparent focus:border-blue-500 transition-colors" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} placeholder="Ex: 12 rue de la Paix, Paris" />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="p-4 bg-slate-50 rounded-xl border">
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-2 block">Propriétaire / Bailleur</label>
                                        <input type="text" className="w-full bg-transparent font-bold outline-none" value={formData.owner} onChange={e => setFormData({...formData, owner: e.target.value})} placeholder="Nom..." />
                                    </div>
                                    <div className="p-4 bg-slate-50 rounded-xl border">
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-2 block">Locataire / Preneur</label>
                                        <input type="text" className="w-full bg-transparent font-bold outline-none" value={formData.tenant} onChange={e => setFormData({...formData, tenant: e.target.value})} placeholder="Nom..." />
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="space-y-8">
                                {formData.rooms.map(room => (
                                    <div key={room.id} className="room-section border-l-4 border-blue-100 pl-4 py-2">
                                        <input className="text-xl font-black uppercase tracking-tight mb-4 w-full outline-none bg-transparent text-blue-900" value={room.name} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, name: e.target.value} : r)})} />
                                        <div className="space-y-4">
                                            {room.elements.map(el => (
                                                <div key={el.id} className="p-4 border rounded-xl bg-white shadow-sm">
                                                    <div className="flex justify-between items-center mb-2">
                                                        <input className="font-bold outline-none flex-1 text-slate-700" value={el.label} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, label: e.target.value} : e2)} : r)})} />
                                                        <select className="text-[10px] font-bold border rounded p-1 bg-slate-50" value={el.status} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, status: e.target.value} : e2)} : r)})}>
                                                            <option>Bon</option><option>Usage</option><option>Mauvais</option>
                                                        </select>
                                                    </div>
                                                    <textarea className="w-full text-xs italic text-slate-400 outline-none border-none resize-none bg-transparent" placeholder="Observation..." value={el.comment} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, comment: e.target.value} : e2)} : r)})} />
                                                </div>
                                            ))}
                                            <button onClick={() => addElement(room.id)} className="w-full py-2 border-2 border-dashed rounded-lg text-slate-300 text-[10px] font-bold uppercase">+ Ajouter un élément</button>
                                        </div>
                                    </div>
                                ))}
                                <button onClick={addRoom} className="w-full py-4 bg-slate-100 rounded-xl text-slate-500 font-black uppercase text-xs hover:bg-slate-200">Ajouter une Pièce</button>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="space-y-8">
                                <h2 className="text-sm font-black text-blue-600 uppercase tracking-widest border-b pb-2">Validation des parties</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <SignaturePad label="Le Bailleur" savedImage={formData.signatures.owner} onSave={(img) => setFormData({...formData, signatures: {...formData.signatures, owner: img}})} />
                                    <SignaturePad label="Le Locataire" savedImage={formData.signatures.tenant} onSave={(img) => setFormData({...formData, signatures: {...formData.signatures, tenant: img}})} />
                                </div>
                            </div>
                        )}

                        {/* Vue Impression */}
                        <div className="hidden print:block space-y-6">
                            <div className="p-4 border">
                                <p><strong>Adresse :</strong> {formData.address}</p>
                                <p><strong>Bailleur :</strong> {formData.owner}</p>
                                <p><strong>Locataire :</strong> {formData.tenant}</p>
                            </div>
                            {formData.rooms.map(room => (
                                <div key={room.id} className="room-section">
                                    <h3 className="text-lg font-bold border-b mb-2">{room.name}</h3>
                                    {room.elements.map(el => (
                                        <div key={el.id} className="grid grid-cols-3 gap-2 border-b py-1 text-sm">
                                            <span>{el.label}</span>
                                            <span className="italic">{el.status}</span>
                                            <span>{el.comment}</span>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    </main>

                    <footer className="no-print p-6 border-t bg-slate-50 flex gap-4 sticky bottom-0 z-40">
                        {step > 1 && (
                            <button onClick={() => setStep(step-1)} className="px-6 py-3 bg-white border font-bold rounded-xl text-slate-500">Précédent</button>
                        )}
                        <button onClick={() => step < 3 ? setStep(step+1) : window.print()} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-black uppercase tracking-widest shadow-lg">
                            {step < 3 ? 'Suivant' : 'Finaliser & PDF'}
                        </button>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

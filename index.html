<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immo-Alex | État des Lieux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://lucide.dev/shortcuts/latest/lucide.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .canvas-container { border: 2px dashed #cbd5e1; border-radius: 0.5rem; background: white; cursor: crosshair; }
        .step-active { border-bottom: 3px solid #3b82f6; color: #1e40af; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURATION FIREBASE (extraite de votre image) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDFm8IK-WL0T4U5n8SNKxs6aE6ePU807_c",
            authDomain: "link-immo-drumet.firebaseapp.com",
            projectId: "link-immo-drumet",
            storageBucket: "link-immo-drumet.firebasestorage.app",
            messagingSenderId: "817653872182",
            appId: "1:817653872182:web:9c897b78732397464f8a97",
            measurementId: "G-KMJ7N3HQQW"
        };

        // Composant de Signature
        const SignaturePad = ({ label, onSave, savedImage }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [hasContent, setHasContent] = useState(!!savedImage);

            useEffect(() => {
                if (savedImage && canvasRef.current) {
                    const ctx = canvasRef.current.getContext('2d');
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0);
                    img.src = savedImage;
                }
            }, [savedImage]);

            const startDrawing = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000';
                
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                
                ctx.beginPath();
                ctx.moveTo(x, y);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const ctx = canvas.getContext('2d');
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.lineTo(x, y);
                ctx.stroke();
                setHasContent(true);
            };

            const stopDrawing = () => {
                setIsDrawing(false);
            };

            const clear = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                setHasContent(false);
                onSave(null);
            };

            return (
                <div className="mb-6">
                    <label className="block text-sm font-semibold text-slate-700 mb-2">{label}</label>
                    <div className="canvas-container relative">
                        <canvas 
                            ref={canvasRef}
                            width={400}
                            height={150}
                            className="w-full h-32 touch-none"
                            onMouseDown={startDrawing}
                            onMouseMove={draw}
                            onMouseUp={stopDrawing}
                            onMouseOut={stopDrawing}
                            onTouchStart={startDrawing}
                            onTouchMove={draw}
                            onTouchEnd={stopDrawing}
                        />
                        {hasContent && (
                            <button onClick={clear} className="absolute top-2 right-2 text-xs bg-red-50 text-red-600 px-2 py-1 rounded">Effacer</button>
                        )}
                    </div>
                    {hasContent && !savedImage && (
                        <button 
                            onClick={() => onSave(canvasRef.current.toDataURL())}
                            className="mt-2 w-full py-2 bg-blue-600 text-white rounded-lg text-sm font-medium"
                        >
                            Valider la signature
                        </button>
                    )}
                </div>
            );
        };

        // Application Principale
        function App() {
            const [step, setStep] = useState(1);
            const [formData, setFormData] = useState({
                address: "Drumettaz Clarafond",
                date: new Date().toLocaleDateString('fr-FR'),
                owner: "",
                tenant: "",
                rooms: [
                    { id: 1, name: 'Entrée', status: 'Bon', comment: '' },
                    { id: 2, name: 'Séjour', status: 'Bon', comment: '' }
                ],
                signatures: { owner: null, tenant: null }
            });

            const nextStep = () => setStep(s => Math.min(s + 1, 3));
            const prevStep = () => setStep(s => Math.max(s - 1, 1));

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-xl">
                    {/* Header */}
                    <header className="bg-slate-900 text-white p-6 pt-10">
                        <h1 className="text-2xl font-bold tracking-tight">Immo-Alex</h1>
                        <p className="text-slate-400 text-sm">Outil d'état des lieux numérique</p>
                    </header>

                    {/* Navigation Étapes */}
                    <div className="flex border-b text-xs font-bold uppercase tracking-widest text-slate-400">
                        <div className={`flex-1 py-4 text-center ${step === 1 ? 'step-active' : ''}`}>Infos</div>
                        <div className={`flex-1 py-4 text-center ${step === 2 ? 'step-active' : ''}`}>Pièces</div>
                        <div className={`flex-1 py-4 text-center ${step === 3 ? 'step-active' : ''}`}>Signatures</div>
                    </div>

                    <main className="p-6">
                        {step === 1 && (
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-slate-700">Adresse du bien</label>
                                    <input type="text" className="mt-1 block w-full border-slate-300 border p-2 rounded-md" value={formData.address} readOnly />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-700">Propriétaire / Bailleur</label>
                                    <input 
                                        type="text" 
                                        className="mt-1 block w-full border-slate-300 border p-2 rounded-md" 
                                        placeholder="Nom du propriétaire"
                                        value={formData.owner}
                                        onChange={e => setFormData({...formData, owner: e.target.value})}
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-700">Locataire entrant</label>
                                    <input 
                                        type="text" 
                                        className="mt-1 block w-full border-slate-300 border p-2 rounded-md" 
                                        placeholder="Nom du locataire"
                                        value={formData.tenant}
                                        onChange={e => setFormData({...formData, tenant: e.target.value})}
                                    />
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="space-y-6">
                                {formData.rooms.map(room => (
                                    <div key={room.id} className="p-4 border rounded-lg bg-slate-50">
                                        <h3 className="font-bold text-slate-900 mb-2">{room.name}</h3>
                                        <div className="flex gap-2 mb-3">
                                            {['Bon', 'Usage', 'Mauvais'].map(s => (
                                                <button 
                                                    key={s}
                                                    onClick={() => {
                                                        const newRooms = formData.rooms.map(r => r.id === room.id ? {...r, status: s} : r);
                                                        setFormData({...formData, rooms: newRooms});
                                                    }}
                                                    className={`flex-1 py-1 text-xs rounded-full border ${room.status === s ? 'bg-blue-600 text-white border-blue-600' : 'bg-white border-slate-300'}`}
                                                >
                                                    {s}
                                                </button>
                                            ))}
                                        </div>
                                        <textarea 
                                            placeholder="Commentaires..."
                                            className="w-full p-2 text-sm border rounded"
                                            value={room.comment}
                                            onChange={e => {
                                                const newRooms = formData.rooms.map(r => r.id === room.id ? {...r, comment: e.target.value} : r);
                                                setFormData({...formData, rooms: newRooms});
                                            }}
                                        ></textarea>
                                    </div>
                                ))}
                            </div>
                        )}

                        {step === 3 && (
                            <div>
                                <SignaturePad 
                                    label="Signature Propriétaire" 
                                    savedImage={formData.signatures.owner}
                                    onSave={(img) => setFormData({...formData, signatures: {...formData.signatures, owner: img}})} 
                                />
                                <SignaturePad 
                                    label="Signature Locataire" 
                                    savedImage={formData.signatures.tenant}
                                    onSave={(img) => setFormData({...formData, signatures: {...formData.signatures, tenant: img}})} 
                                />
                                
                                {formData.signatures.owner && formData.signatures.tenant && (
                                    <button className="w-full py-4 bg-green-600 text-white rounded-xl font-bold mt-4 shadow-lg active:scale-95 transition-transform">
                                        TERMINER & ENREGISTRER
                                    </button>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer Nav */}
                    <footer className="p-6 border-t flex justify-between bg-slate-50">
                        <button 
                            onClick={prevStep}
                            disabled={step === 1}
                            className={`px-6 py-2 rounded-lg font-medium ${step === 1 ? 'text-slate-300' : 'text-slate-600'}`}
                        >
                            Retour
                        </button>
                        {step < 3 && (
                            <button 
                                onClick={nextStep}
                                className="px-6 py-2 bg-slate-900 text-white rounded-lg font-medium shadow-md"
                            >
                                Suivant
                            </button>
                        )}
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

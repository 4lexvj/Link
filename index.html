<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Immo-Alex | État des Lieux Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .page-break { page-break-after: always; }
        }
        body { background-color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .signature-pad { border: 2px dashed #cbd5e1; background: #fff; cursor: crosshair; touch-action: none; }
        .btn-status-active { background-color: #2563eb !important; color: white !important; border-color: #2563eb !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONES SVG (Lucide-like) ---
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconCamera = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconShare = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>;

        // --- COMPOSANT SIGNATURE ---
        const SignaturePad = ({ label, onSave, savedImage }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [hasContent, setHasContent] = useState(!!savedImage);

            useEffect(() => {
                if (savedImage && canvasRef.current) {
                    const ctx = canvasRef.current.getContext('2d');
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0);
                    img.src = savedImage;
                }
            }, [savedImage]);

            const getPos = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => {
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000';
                setIsDrawing(true);
            };

            const move = (e) => {
                if (!isDrawing) return;
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                setHasContent(true);
            };

            const stop = () => {
                setIsDrawing(false);
                if (hasContent) onSave(canvasRef.current.toDataURL());
            };

            const clear = () => {
                const ctx = canvasRef.current.getContext('2d');
                ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                setHasContent(false);
                onSave(null);
            };

            return (
                <div className="mb-6 bg-white p-4 rounded-xl border border-slate-200">
                    <label className="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wider">{label}</label>
                    <div className="relative">
                        <canvas 
                            ref={canvasRef} width={400} height={160}
                            className="signature-pad w-full h-40 rounded-lg"
                            onMouseDown={start} onMouseMove={move} onMouseUp={stop}
                            onTouchStart={start} onTouchMove={move} onTouchEnd={stop}
                        />
                        {hasContent && (
                            <button onClick={clear} className="no-print absolute top-2 right-2 bg-red-50 text-red-600 p-1 rounded-md text-xs font-bold">EFFACER</button>
                        )}
                    </div>
                </div>
            );
        };

        // --- APPLICATION ---
        function App() {
            const [step, setStep] = useState(1);
            const [formData, setFormData] = useState(() => {
                const saved = localStorage.getItem('immo_alex_v3');
                return saved ? JSON.parse(saved) : {
                    address: "",
                    date: new Date().toLocaleDateString('fr-FR'),
                    owner: "",
                    tenant: "",
                    rooms: [
                        { id: 1, name: 'Entrée', elements: [{ id: 101, label: 'Porte', status: 'Bon', comment: '', photos: [] }] },
                        { id: 2, name: 'Séjour', elements: [{ id: 201, label: 'Sols', status: 'Bon', comment: '', photos: [] }] }
                    ],
                    signatures: { owner: null, tenant: null }
                };
            });

            useEffect(() => {
                localStorage.setItem('immo_alex_v3', JSON.stringify(formData));
            }, [formData]);

            const fileInputRef = useRef(null);
            const [activeTarget, setActiveTarget] = useState(null);

            // Fonctions de gestion des données
            const addRoom = () => {
                const newRoom = { id: Date.now(), name: 'Nouvelle pièce', elements: [] };
                setFormData({...formData, rooms: [...formData.rooms, newRoom]});
            };

            const deleteRoom = (id) => {
                setFormData({...formData, rooms: formData.rooms.filter(r => r.id !== id)});
            };

            const addElement = (roomId) => {
                setFormData({
                    ...formData,
                    rooms: formData.rooms.map(r => r.id === roomId ? {
                        ...r, 
                        elements: [...r.elements, { id: Date.now(), label: 'Nouvel élément', status: 'Bon', comment: '', photos: [] }]
                    } : r)
                });
            };

            const handlePhoto = (e) => {
                const file = e.target.files[0];
                if (!file || !activeTarget) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);

                        setFormData({
                            ...formData,
                            rooms: formData.rooms.map(r => r.id === activeTarget.roomId ? {
                                ...r,
                                elements: r.elements.map(el => el.id === activeTarget.elId ? {
                                    ...el, photos: [...el.photos, dataUrl]
                                } : el)
                            } : r)
                        });
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const printPDF = () => window.print();

            return (
                <div className="max-w-2xl mx-auto min-h-screen bg-white shadow-2xl flex flex-col">
                    <input type="file" accept="image/*" capture="environment" ref={fileInputRef} className="hidden" onChange={handlePhoto} />
                    
                    {/* Header */}
                    <header className="bg-slate-900 text-white p-6 pt-10 no-print">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-black tracking-tighter italic">IMMO-ALEX</h1>
                                <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">Expertise État des Lieux</p>
                            </div>
                            <button onClick={printPDF} className="bg-blue-600 p-3 rounded-full shadow-lg active:scale-90 transition-transform">
                                <IconShare />
                            </button>
                        </div>
                    </header>

                    {/* Navigation Étapes */}
                    <nav className="no-print flex border-b bg-white sticky top-0 z-10">
                        {[1, 2, 3].map(num => (
                            <button 
                                key={num}
                                onClick={() => setStep(num)}
                                className={`flex-1 py-4 text-[10px] font-black uppercase tracking-widest transition-colors ${step === num ? 'border-b-4 border-blue-600 text-blue-600' : 'text-slate-400'}`}
                            >
                                {num === 1 ? 'Infos' : num === 2 ? 'Pièces' : 'Validation'}
                            </button>
                        ))}
                    </nav>

                    {/* Contenu */}
                    <main className="flex-1 p-6">
                        {step === 1 && (
                            <div className="space-y-6">
                                <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                    <label className="block text-xs font-black text-slate-500 mb-2 uppercase">Adresse du bien</label>
                                    <input 
                                        type="text" 
                                        className="w-full bg-transparent text-xl font-bold text-slate-900 outline-none border-b-2 border-slate-200 focus:border-blue-500 pb-1"
                                        placeholder="Ex: 12 Rue de la Paix..."
                                        value={formData.address}
                                        onChange={e => setFormData({...formData, address: e.target.value})}
                                    />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                        <label className="block text-xs font-black text-slate-500 mb-2 uppercase">Propriétaire</label>
                                        <input type="text" className="w-full bg-transparent font-bold outline-none" value={formData.owner} onChange={e => setFormData({...formData, owner: e.target.value})} placeholder="Nom..." />
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                        <label className="block text-xs font-black text-slate-500 mb-2 uppercase">Locataire</label>
                                        <input type="text" className="w-full bg-transparent font-bold outline-none" value={formData.tenant} onChange={e => setFormData({...formData, tenant: e.target.value})} placeholder="Nom..." />
                                    </div>
                                </div>
                            </div>
                        )}

                        {(step === 2 || window.matchMedia('print').matches) && (
                            <div className="space-y-8">
                                {formData.rooms.map(room => (
                                    <section key={room.id} className="relative bg-white border-l-4 border-blue-600 pl-4 py-2">
                                        <div className="flex justify-between items-center mb-4">
                                            <input 
                                                className="text-lg font-black text-slate-900 bg-transparent outline-none uppercase tracking-tight"
                                                value={room.name}
                                                onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, name: e.target.value} : r)})}
                                            />
                                            <button onClick={() => deleteRoom(room.id)} className="no-print text-red-300 hover:text-red-500"><IconTrash /></button>
                                        </div>

                                        <div className="space-y-4">
                                            {room.elements.map(el => (
                                                <div key={el.id} className="p-4 rounded-xl border border-slate-100 bg-slate-50/50">
                                                    <input 
                                                        className="font-bold text-slate-700 bg-transparent outline-none w-full mb-3"
                                                        value={el.label}
                                                        onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, label: e.target.value} : e2)} : r)})}
                                                    />
                                                    
                                                    <div className="no-print flex gap-1 mb-3">
                                                        {['Bon', 'Usage', 'Mauvais'].map(st => (
                                                            <button 
                                                                key={st}
                                                                className={`flex-1 py-1.5 text-[10px] font-bold rounded-lg border transition-all ${el.status === st ? 'btn-status-active shadow-md' : 'bg-white text-slate-400 border-slate-200'}`}
                                                                onClick={() => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, status: st} : e2)} : r)})}
                                                            >
                                                                {st.toUpperCase()}
                                                            </button>
                                                        ))}
                                                    </div>

                                                    <textarea 
                                                        className="w-full p-2 text-sm bg-white border border-slate-100 rounded-lg outline-none italic text-slate-500 mb-2"
                                                        placeholder="Commentaires (ex: rayure sur le bas...)"
                                                        value={el.comment}
                                                        onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, comment: e.target.value} : e2)} : r)})}
                                                    />

                                                    {/* Photos */}
                                                    <div className="flex gap-2 overflow-x-auto pb-2">
                                                        <button 
                                                            onClick={() => { setActiveTarget({roomId: room.id, elId: el.id}); fileInputRef.current.click(); }}
                                                            className="no-print w-16 h-16 shrink-0 bg-white border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center text-slate-300 active:bg-blue-50"
                                                        >
                                                            <IconCamera />
                                                        </button>
                                                        {el.photos.map((p, i) => (
                                                            <div key={i} className="relative w-16 h-16 shrink-0 group">
                                                                <img src={p} className="w-full h-full object-cover rounded-xl shadow-sm border border-white" />
                                                                <button 
                                                                    onClick={() => {
                                                                        const newPhotos = el.photos.filter((_, idx) => idx !== i);
                                                                        setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, photos: newPhotos} : e2)} : r)});
                                                                    }}
                                                                    className="no-print absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-0.5 shadow-md"
                                                                ><IconTrash /></button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                            <button 
                                                onClick={() => addElement(room.id)}
                                                className="no-print w-full py-2 text-[10px] font-black text-blue-500 border border-dashed border-blue-200 rounded-lg uppercase tracking-widest hover:bg-blue-50"
                                            >
                                                + Ajouter un élément
                                            </button>
                                        </div>
                                    </section>
                                ))}
                                <button 
                                    onClick={addRoom}
                                    className="no-print w-full py-4 bg-slate-100 text-slate-600 rounded-2xl font-black uppercase tracking-tighter flex items-center justify-center gap-2 hover:bg-slate-200"
                                >
                                    <IconPlus /> Ajouter une pièce
                                </button>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="animate-in fade-in duration-500">
                                <div className="mb-8 text-center no-print">
                                    <div className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white mx-auto mb-4 shadow-xl">
                                        <IconShare />
                                    </div>
                                    <h2 className="text-xl font-black text-slate-900 uppercase">Dernière étape</h2>
                                    <p className="text-slate-500 text-sm">Veuillez apposer les signatures pour figer le document.</p>
                                </div>

                                <SignaturePad label="Signature du Bailleur (Propriétaire)" savedImage={formData.signatures.owner} onSave={(img) => setFormData({...formData, signatures: {...formData.signatures, owner: img}})} />
                                <SignaturePad label="Signature du Locataire entrant" savedImage={formData.signatures.tenant} onSave={(img) => setFormData({...formData, signatures: {...formData.signatures, tenant: img}})} />

                                {formData.signatures.owner && formData.signatures.tenant && (
                                    <button 
                                        onClick={printPDF}
                                        className="no-print w-full py-5 bg-green-600 text-white rounded-2xl font-black text-lg shadow-xl shadow-green-100 flex items-center justify-center gap-3 active:scale-95 transition-transform mt-4"
                                    >
                                        GÉNÉRER LE PDF FINAL
                                    </button>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer Fixe pour le déplacement */}
                    <footer className="no-print p-6 border-t bg-slate-50 flex justify-between gap-4 sticky bottom-0">
                        {step > 1 && (
                            <button onClick={() => setStep(step - 1)} className="px-8 py-3 bg-white border border-slate-200 text-slate-600 rounded-xl font-bold shadow-sm">Retour</button>
                        )}
                        {step < 3 && (
                            <button onClick={() => setStep(step + 1)} className="flex-1 py-3 bg-slate-900 text-white rounded-xl font-black uppercase tracking-widest shadow-lg shadow-slate-200">Suivant</button>
                        )}
                    </footer>

                    {/* Mentions légales PDF */}
                    <footer className="hidden print:block p-10 text-[10px] text-slate-400 border-t mt-10">
                        Document certifié Immo-Alex - Fait le {formData.date} à {formData.address}.
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

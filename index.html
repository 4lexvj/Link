<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Immo-Alex | Cloud & PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; margin: 0; padding: 0; }
            .room-section { break-inside: avoid; border-left: 2px solid #000 !important; margin-bottom: 20px; padding-left: 15px; }
            .signature-container { break-inside: avoid; margin-top: 30px; }
            .max-w-3xl { max-width: 100% !important; width: 100% !important; box-shadow: none !important; }
        }
        
        body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .signature-pad { border: 2px dashed #cbd5e1; background: #fff; touch-action: none; cursor: crosshair; }
        
        .status-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .online { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .offline { background-color: #f59e0b; } /* Orange pour "Mode Local" */
        .syncing { background-color: #3b82f6; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Amélioration défilement horizontal photos */
        .photo-strip::-webkit-scrollbar { height: 4px; }
        .photo-strip::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root">
        <div class="h-screen flex flex-col items-center justify-center text-slate-400 font-medium text-center p-10">
            <div class="loader mb-4"></div>
            Chargement Immo-Alex Pro...
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFm8IK-Wl0T4U5n8SNkXs6aE6ePU807_c",
            authDomain: "link-immo-drumet.firebaseapp.com",
            projectId: "link-immo-drumet",
            storageBucket: "link-immo-drumet.firebasestorage.app",
            messagingSenderId: "817653872182",
            appId: "1:817653872182:web:9c897b78732397464f8a97",
            measurementId: "G-KMJ7N3HQQW"
        };

        const initFirebase = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                const appId = "immo-alex-prod";

                window.FirebaseSDK = { 
                    auth, db, appId, doc, setDoc, collection, onSnapshot, 
                    signInAnonymously, onAuthStateChanged,
                    isCloudEnabled: true
                };
            } catch (e) {
                window.FirebaseSDK = { isCloudEnabled: false };
            }
            window.dispatchEvent(new Event('firebase-ready'));
        };

        initFirebase();
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SignaturePad = ({ label, onSave, savedImage }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            const getPos = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => {
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#0f172a';
                ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
                setIsDrawing(true);
            };

            const move = (e) => {
                if (!isDrawing) return;
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(pos.x, pos.y); ctx.stroke();
            };

            const stop = () => {
                if (!isDrawing) return;
                setIsDrawing(false);
                onSave(canvasRef.current.toDataURL());
            };

            const clear = () => {
                const ctx = canvasRef.current.getContext('2d');
                ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                onSave(null);
            };

            return (
                <div className="mb-4 signature-container">
                    <div className="flex justify-between items-center mb-2">
                        <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-widest">{label}</label>
                        <button onClick={clear} className="no-print text-[10px] text-red-500 font-bold uppercase">Effacer</button>
                    </div>
                    <div className="relative">
                        <canvas 
                            ref={canvasRef} width={400} height={150}
                            className={`signature-pad w-full h-32 rounded-lg border-2 border-dashed border-slate-200 ${savedImage ? 'print:hidden' : ''}`}
                            onMouseDown={start} onMouseMove={move} onMouseUp={stop}
                            onTouchStart={start} onTouchMove={move} onTouchEnd={stop}
                        />
                        {savedImage && <img src={savedImage} className="hidden print:block w-full h-32 object-contain border rounded-lg" alt="Signature" />}
                    </div>
                </div>
            );
        };

        function App() {
            const [fb, setFb] = useState(window.FirebaseSDK);
            const [step, setStep] = useState(1);
            const [user, setUser] = useState(null);
            const [syncStatus, setSyncStatus] = useState('idle');
            const [cloudMode, setCloudMode] = useState(false);
            const fileInputRef = useRef(null);
            const [activeElement, setActiveElement] = useState(null); // {roomId, elId}
            
            const [formData, setFormData] = useState({
                address: "",
                date: new Date().toLocaleDateString('fr-FR'),
                owner: "",
                tenant: "",
                rooms: [
                    { id: 1, name: 'Entrée', elements: [{ id: 101, label: 'Porte', status: 'Bon', comment: '', photos: [] }] }
                ],
                signatures: { owner: null, tenant: null }
            });

            useEffect(() => {
                const handleFbReady = () => setFb(window.FirebaseSDK);
                window.addEventListener('firebase-ready', handleFbReady);
                if (window.FirebaseSDK) setFb(window.FirebaseSDK);
                return () => window.removeEventListener('firebase-ready', handleFbReady);
            }, []);

            useEffect(() => {
                if (!fb || !fb.isCloudEnabled) return;
                
                const unsubAuth = fb.onAuthStateChanged(fb.auth, async (u) => {
                    if (u) {
                        setUser(u);
                        setCloudMode(true);
                        const docRef = fb.doc(fb.db, 'artifacts', fb.appId, 'users', u.uid, 'edl', 'current');
                        fb.onSnapshot(docRef, (docSnap) => {
                            if (docSnap.exists()) {
                                setFormData(prev => ({...prev, ...docSnap.data()}));
                            }
                        }, (err) => console.warn("Erreur snapshot:", err));
                    } else {
                        try {
                            await fb.signInAnonymously(fb.auth);
                        } catch (e) {
                            console.warn("Auth non configurée.");
                            setCloudMode(false);
                        }
                    }
                });
                return () => unsubAuth();
            }, [fb]);

            useEffect(() => {
                if (!cloudMode || !user || !fb) return;
                const timer = setTimeout(async () => {
                    setSyncStatus('syncing');
                    try {
                        const docRef = fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'edl', 'current');
                        await fb.setDoc(docRef, { ...formData, lastUpdated: new Date().toISOString() }, { merge: true });
                        setSyncStatus('saved');
                        setTimeout(() => setSyncStatus('idle'), 2000);
                    } catch (e) { setSyncStatus('idle'); }
                }, 2000);
                return () => clearTimeout(timer);
            }, [formData, user, fb, cloudMode]);

            // Gestion des photos
            const triggerPhoto = (roomId, elId) => {
                setActiveElement({ roomId, elId });
                fileInputRef.current.click();
            };

            const handlePhoto = (e) => {
                const file = e.target.files[0];
                if (!file || !activeElement) return;

                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64 = reader.result;
                    setFormData(prev => ({
                        ...prev,
                        rooms: prev.rooms.map(r => r.id === activeElement.roomId ? {
                            ...r,
                            elements: r.elements.map(el => el.id === activeElement.elId ? {
                                ...el,
                                photos: [...(el.photos || []), base64]
                            } : el)
                        } : r)
                    }));
                };
                reader.readAsDataURL(file);
            };

            const shareReport = async () => {
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: 'État des Lieux Immo-Alex',
                            text: `Rapport pour : ${formData.address || 'Sans adresse'}`,
                            url: window.location.href
                        });
                    } catch (err) { console.log(err); }
                } else {
                    window.print();
                }
            };

            if (!fb) return <div className="h-screen flex items-center justify-center">Initialisation...</div>;

            return (
                <div className="max-w-3xl mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative">
                    <input type="file" accept="image/*" capture="environment" ref={fileInputRef} className="hidden" onChange={handlePhoto} />
                    
                    <header className="no-print bg-slate-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center">
                        <div className="flex flex-col">
                            <span className="text-xl font-black italic tracking-tighter">IMMO-ALEX</span>
                            <div className="flex items-center mt-1">
                                <span className={`status-pulse ${cloudMode ? (syncStatus === 'syncing' ? 'syncing' : 'online') : 'offline'}`}></span>
                                <span className="text-[10px] font-bold uppercase text-slate-400">
                                    {cloudMode ? 'Cloud Actif' : 'Mode Local (Synchro Désactivée)'}
                                </span>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={shareReport} className="p-3 bg-slate-700 rounded-full hover:bg-slate-600 shadow-lg transition-all active:scale-90">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                            </button>
                            <button onClick={() => window.print()} className="p-3 bg-blue-600 rounded-full hover:bg-blue-500 shadow-lg transition-all active:scale-90">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                            </button>
                        </div>
                    </header>

                    <nav className="no-print flex border-b bg-white">
                        {[1, 2, 3].map(n => (
                            <button key={n} onClick={() => setStep(n)} className={`flex-1 py-4 text-[10px] font-black uppercase tracking-widest transition-all ${step === n ? 'text-blue-600 border-b-4 border-blue-600 bg-blue-50' : 'text-slate-400'}`}>
                                {n === 1 ? 'Infos' : n === 2 ? 'Inventaire' : 'Signature'}
                            </button>
                        ))}
                    </nav>

                    <main className="p-6 flex-1">
                        {step === 1 && (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="p-5 bg-slate-50 rounded-2xl border border-slate-200 shadow-inner">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Adresse du Bien</label>
                                    <input type="text" className="w-full bg-transparent text-xl font-bold outline-none" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} placeholder="Ex: 12 rue de la Paix..." />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="p-5 bg-slate-50 rounded-2xl border border-slate-200">
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-2 block">Propriétaire</label>
                                        <input type="text" className="w-full bg-transparent font-bold outline-none" value={formData.owner} onChange={e => setFormData({...formData, owner: e.target.value})} placeholder="Nom du bailleur" />
                                    </div>
                                    <div className="p-5 bg-slate-50 rounded-2xl border border-slate-200">
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-2 block">Locataire</label>
                                        <input type="text" className="w-full bg-transparent font-bold outline-none" value={formData.tenant} onChange={e => setFormData({...formData, tenant: e.target.value})} placeholder="Nom du locataire" />
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="space-y-8 animate-fadeIn">
                                {formData.rooms.map(room => (
                                    <div key={room.id} className="room-section border-l-4 border-blue-500 bg-slate-50 pl-4 py-4 rounded-r-2xl mb-6 shadow-sm">
                                        <div className="flex justify-between items-center mb-4">
                                            <input className="text-lg font-black uppercase w-full outline-none bg-transparent text-blue-900" value={room.name} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, name: e.target.value} : r)})} />
                                            <button onClick={() => setFormData({...formData, rooms: formData.rooms.filter(r => r.id !== room.id)})} className="no-print text-red-400 p-2"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            {room.elements.map(el => (
                                                <div key={el.id} className="p-4 border rounded-xl bg-white shadow-sm transition-all">
                                                    <div className="flex justify-between items-center mb-3 gap-3">
                                                        <input className="font-bold outline-none flex-1 text-slate-700" value={el.label} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, label: e.target.value} : e2)} : r)})} />
                                                        <select className="text-[10px] font-black border rounded-lg p-2 bg-slate-50 text-blue-600 outline-none" value={el.status} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, status: e.target.value} : e2)} : r)})}>
                                                            <option>Neuf</option><option>Bon</option><option>Moyen</option><option>Mauvais</option>
                                                        </select>
                                                    </div>
                                                    
                                                    <div className="no-print flex gap-2 overflow-x-auto pb-2 photo-strip mb-2">
                                                        <button onClick={() => triggerPhoto(room.id, el.id)} className="w-14 h-14 shrink-0 bg-slate-100 rounded-lg flex items-center justify-center text-slate-400 hover:bg-blue-50 hover:text-blue-500 border-2 border-dashed border-slate-200">
                                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                                                        </button>
                                                        {el.photos?.map((p, idx) => (
                                                            <div key={idx} className="relative w-14 h-14 shrink-0 shadow-sm border rounded-lg overflow-hidden group">
                                                                <img src={p} className="w-full h-full object-cover" />
                                                                <button onClick={() => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, photos: e2.photos.filter((_, i) => i !== idx)} : e2)} : r)})} className="absolute top-0 right-0 bg-red-500 text-white p-0.5 opacity-0 group-hover:opacity-100 transition-opacity"><svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                                                            </div>
                                                        ))}
                                                    </div>

                                                    <textarea className="w-full text-xs italic text-slate-500 outline-none border-none bg-transparent" placeholder="Observations (clés, rayures...)" rows="1" value={el.comment} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(e2 => e2.id === el.id ? {...e2, comment: e.target.value} : e2)} : r)})} />
                                                </div>
                                            ))}
                                            <button onClick={() => {
                                                setFormData({
                                                    ...formData,
                                                    rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: [...(r.elements || []), { id: Date.now(), label: 'Élément', status: 'Bon', comment: '', photos: [] }]} : r)
                                                });
                                            }} className="w-full py-2 border-2 border-dashed border-slate-200 rounded-lg text-slate-300 text-[10px] font-black uppercase hover:border-blue-300 hover:text-blue-400 transition-all">+ Élément</button>
                                        </div>
                                    </div>
                                ))}
                                <button onClick={() => setFormData({...formData, rooms: [...formData.rooms, { id: Date.now(), name: 'Nouvelle pièce', elements: [] }]})} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Ajouter une Pièce</button>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="space-y-8 animate-fadeIn">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <SignaturePad label="Bailleur" savedImage={formData.signatures.owner} onSave={(img) => setFormData({...formData, signatures: {...formData.signatures, owner: img}})} />
                                    <SignaturePad label="Locataire" savedImage={formData.signatures.tenant} onSave={(img) => setFormData({...formData, signatures: {...formData.signatures, tenant: img}})} />
                                </div>
                                <div className="p-4 bg-blue-50 border border-blue-100 rounded-xl text-[10px] text-blue-700 font-bold leading-relaxed">
                                    En signant ce document, les parties reconnaissent l'exactitude des informations saisies et l'état général du bien tel que décrit.
                                </div>
                            </div>
                        )}

                        {/* Rendu Impression PDF */}
                        <div className="hidden print:block font-serif text-slate-900">
                            <div className="border-b-4 border-slate-900 pb-4 mb-8 flex justify-between items-end">
                                <div><h1 className="text-3xl font-black italic uppercase">État des Lieux</h1></div>
                                <div className="text-right"><p className="font-bold">Date : {formData.date}</p></div>
                            </div>
                            <div className="grid grid-cols-2 gap-6 mb-8">
                                <div className="p-4 bg-slate-50 border rounded-xl"><h4 className="text-[10px] font-black uppercase text-slate-400">Bien immobilier</h4><p className="font-bold">{formData.address || 'Non spécifié'}</p></div>
                                <div className="grid grid-cols-1 gap-2">
                                    <div className="p-2 border rounded-lg text-xs"><b>Bailleur :</b> {formData.owner || 'N/A'}</div>
                                    <div className="p-2 border rounded-lg text-xs"><b>Locataire :</b> {formData.tenant || 'N/A'}</div>
                                </div>
                            </div>
                            {formData.rooms.map(room => (
                                <div key={room.id} className="room-section mb-6">
                                    <h3 className="text-lg font-black border-b-2 border-slate-900 mb-2 uppercase">{room.name}</h3>
                                    <table className="w-full text-left border-collapse text-xs">
                                        <thead><tr className="bg-slate-100 uppercase text-[9px]">
                                            <th className="border p-2">Élément</th>
                                            <th className="border p-2 w-20 text-center">État</th>
                                            <th className="border p-2">Observations</th>
                                        </tr></thead>
                                        <tbody>{room.elements.map(el => (
                                            <tr key={el.id} className="break-inside-avoid">
                                                <td className="border p-2 font-bold">{el.label}</td>
                                                <td className="border p-2 text-center font-black uppercase">{el.status}</td>
                                                <td className="border p-2 italic text-slate-600">
                                                    {el.comment || "RAS"}
                                                    <div className="mt-2 flex gap-1 flex-wrap">
                                                        {el.photos?.map((p, i) => (
                                                            <img key={i} src={p} className="h-10 w-10 object-cover border rounded" />
                                                        ))}
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}</tbody>
                                    </table>
                                </div>
                            ))}
                        </div>
                    </main>

                    <footer className="no-print p-6 border-t bg-slate-50 flex gap-4 sticky bottom-0 z-40">
                        {step > 1 && <button onClick={() => setStep(step-1)} className="px-6 py-4 bg-white border-2 border-slate-200 font-bold rounded-2xl text-slate-500 active:scale-95 transition-all">Retour</button>}
                        <button onClick={() => step < 3 ? setStep(step+1) : window.print()} className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                            {step < 3 ? 'Suivant' : 'Générer le Rapport'}
                        </button>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

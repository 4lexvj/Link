<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Immo-Alex's - Gestion Immobilière</title>
    
    <!-- Bibliothèques UI -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Intégration Firebase Cloud -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = window.__app_id || 'immo-alex-elite-v1';

        // Export des services pour React
        window.FB_SERVICES = { 
            auth, db, appId, 
            signInAnonymously, signInWithCustomToken, onAuthStateChanged, 
            collection, onSnapshot, doc, setDoc, addDoc, deleteDoc, serverTimestamp 
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .print-only { display: none; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; }
            .page-break { page-break-before: always; }
        }
        canvas { touch-action: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Utilitaires
        const downloadFile = () => {
            const content = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
            const blob = new Blob([content], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'Immo-Alex-Backup.html';
            a.click();
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        };

        // --- COMPOSANT SIGNATURE ---
        const SignaturePad = ({ label, onSave, savedImage }) => {
            const canvasRef = useRef(null);
            const [drawing, setDrawing] = useState(false);

            useEffect(() => {
                if (savedImage || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
                
                const getPos = (e) => {
                    const r = canvas.getBoundingClientRect();
                    const t = e.touches ? e.touches[0] : e;
                    return { x: t.clientX - r.left, y: t.clientY - r.top };
                };

                canvas.onmousedown = canvas.ontouchstart = (e) => { 
                    setDrawing(true); ctx.beginPath(); 
                    const p = getPos(e); ctx.moveTo(p.x, p.y); 
                };
                canvas.onmousemove = canvas.ontouchmove = (e) => {
                    if (!drawing) return;
                    e.preventDefault();
                    const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
                };
                window.onmouseup = window.ontouchend = () => setDrawing(false);
            }, [drawing, savedImage]);

            return (
                <div className="space-y-3">
                    <div className="flex justify-between items-center px-1">
                        <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">{label}</span>
                        {savedImage && <button onClick={() => onSave(null)} className="text-rose-500 text-[10px] font-bold">EFFACER</button>}
                    </div>
                    <div className="h-40 bg-white rounded-3xl border-2 border-slate-100 relative overflow-hidden">
                        {savedImage ? <img src={savedImage} className="w-full h-full object-contain p-4" /> : <canvas ref={canvasRef} width={400} height={200} className="w-full h-full" />}
                        {!savedImage && <button onClick={() => onSave(canvasRef.current.toDataURL())} className="absolute bottom-3 right-3 bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-bold">VALIDER</button>}
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('list');
            const [reports, setReports] = useState([]);
            const [currentId, setCurrentId] = useState(null);
            const [step, setStep] = useState(1);
            const [sync, setSync] = useState('Prêt');
            const [preview, setPreview] = useState(null);
            const fileInput = useRef(null);
            const [activeEl, setActiveEl] = useState(null);

            const [formData, setFormData] = useState({
                property: { address: '', owner: '', tenant: '', date: new Date().toLocaleDateString('fr-FR') },
                rooms: [{ id: 1, name: 'Séjour', elements: [{ id: 101, label: 'Sols', status: 'B', comment: '', photos: [] }] }],
                signatures: { owner: null, tenant: null }
            });

            // Initialisation Auth (Regle 3)
            useEffect(() => {
                const initAuth = async () => {
                    if (window.FB_SERVICES) {
                        const { auth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.FB_SERVICES;
                        try {
                            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                                await signInWithCustomToken(auth, window.__initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                        } catch (err) {
                            console.error("Auth error:", err);
                        }
                        const unsubscribe = onAuthStateChanged(auth, setUser);
                        return () => unsubscribe();
                    }
                };
                
                const timer = setInterval(() => {
                    if (window.FB_SERVICES) {
                        clearInterval(timer);
                        initAuth();
                    }
                }, 100);
                return () => clearInterval(timer);
            }, []);

            // Synchronisation Firestore (Regle 1 & 3)
            useEffect(() => {
                if (!user || !window.FB_SERVICES) return;
                
                const { db, appId, collection, onSnapshot } = window.FB_SERVICES;
                // Chemin strict requis: /artifacts/{appId}/public/data/{collectionName}
                const reportsCol = collection(db, 'artifacts', appId, 'public', 'data', 'reports');
                
                const unsubscribe = onSnapshot(reportsCol, 
                    (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setReports(data);
                    },
                    (error) => {
                        console.error("Firestore sync error:", error);
                        setSync('Erreur Sync');
                    }
                );

                return () => unsubscribe();
            }, [user]);

            const save = async (data = formData) => {
                if (!user || !window.FB_SERVICES) return;
                setSync('Sauvegarde...');
                const { db, appId, doc, setDoc, addDoc, collection } = window.FB_SERVICES;
                try {
                    if (currentId) {
                        const reportDoc = doc(db, 'artifacts', appId, 'public', 'data', 'reports', currentId);
                        await setDoc(reportDoc, data);
                    } else {
                        const reportsCol = collection(db, 'artifacts', appId, 'public', 'data', 'reports');
                        const res = await addDoc(reportsCol, data);
                        setCurrentId(res.id);
                    }
                    setSync('Synchronisé');
                } catch (e) { 
                    console.error("Save error:", e);
                    setSync('Erreur'); 
                }
            };

            const handlePhoto = async (e) => {
                const file = e.target.files[0];
                if (!file || !activeEl) return;
                setSync('Optimisation...');
                const base64 = await compressImage(file);
                const newRooms = formData.rooms.map(r => ({
                    ...r, elements: r.elements.map(el => el.id === activeEl ? { ...el, photos: [...(el.photos || []), base64] } : el)
                }));
                const newFull = { ...formData, rooms: newRooms };
                setFormData(newFull);
                save(newFull);
                setActiveEl(null);
            };

            const handleShare = () => {
                if (navigator.share) {
                    navigator.share({ title: "Immo-Alex's", text: `Dossier: ${formData.property.address}`, url: window.location.href });
                } else {
                    const t = document.createElement('textarea'); t.value = window.location.href; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
                    setSync('Lien copié !');
                    setTimeout(() => setSync('Synchronisé'), 2000);
                }
            };

            if (view === 'list') return (
                <div className="max-w-xl mx-auto p-6 space-y-8">
                    <button onClick={downloadFile} className="fixed top-4 right-4 bg-emerald-600 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase shadow-xl z-50">Sauvegarde PC</button>
                    
                    <header className="pt-12">
                        <h1 className="text-4xl font-black italic uppercase tracking-tighter">Immo-Alex's</h1>
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Gestionnaire d'États des Lieux</p>
                    </header>

                    <div className="grid gap-4">
                        {reports.map(r => (
                            <div key={r.id} onClick={() => { setFormData(r); setCurrentId(r.id); setView('editor'); setStep(1); }} className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm cursor-pointer hover:scale-[1.02] transition-all">
                                <h3 className="font-bold uppercase text-sm">{r.property?.address || 'Adresse manquante'}</h3>
                                <p className="text-[10px] text-slate-400 mt-1 uppercase">{r.property?.date} • {r.property?.tenant}</p>
                            </div>
                        ))}
                        <button onClick={() => { setCurrentId(null); setView('editor'); setStep(1); setFormData({ property: { address: '', owner: '', tenant: '', date: new Date().toLocaleDateString('fr-FR') }, rooms: [{ id: 1, name: 'Entrée', elements: [{ id: 101, label: 'Porte', status: 'B', comment: '', photos: [] }] }], signatures: { owner: null, tenant: null } }); }} className="py-12 border-2 border-dashed border-slate-200 rounded-[2rem] text-[10px] font-black uppercase tracking-widest text-slate-300 hover:text-slate-900 transition-all">+ Nouveau Dossier</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-white">
                    <header className="fixed top-0 inset-x-0 h-16 bg-white/80 backdrop-blur-md border-b z-50 flex items-center justify-between px-6 no-print">
                        <button onClick={() => setView('list')} className="text-slate-400 font-bold uppercase text-[10px]">Quitter</button>
                        <div className="text-center">
                            <h2 className="text-[10px] font-black uppercase">Immo-Alex's</h2>
                            <span className="text-[8px] font-bold uppercase text-emerald-500">{sync}</span>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={handleShare} className="bg-slate-100 p-2 rounded-full"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg></button>
                            <button onClick={() => window.print()} className="bg-slate-900 text-white px-4 py-1.5 rounded-full text-[10px] font-bold">PDF</button>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto pt-24 pb-40 px-6 no-print space-y-10">
                        <input type="file" className="hidden" ref={fileInput} onChange={handlePhoto} accept="image/*" capture="environment" />
                        
                        {step === 1 && (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4">
                                <h3 className="text-3xl font-black italic uppercase">Le Bien</h3>
                                <div className="space-y-4 bg-slate-50 p-6 rounded-[2rem]">
                                    <textarea className="w-full p-4 rounded-2xl border-none font-bold bg-white shadow-sm outline-none" placeholder="Adresse du bien..." value={formData.property.address} onChange={e => setFormData({...formData, property:{...formData.property, address: e.target.value}})} onBlur={() => save()} />
                                    <input className="w-full p-4 rounded-2xl border-none font-bold bg-white shadow-sm outline-none" placeholder="Propriétaire" value={formData.property.owner} onChange={e => setFormData({...formData, property:{...formData.property, owner: e.target.value}})} onBlur={() => save()} />
                                    <input className="w-full p-4 rounded-2xl border-none font-bold bg-white shadow-sm outline-none" placeholder="Locataire" value={formData.property.tenant} onChange={e => setFormData({...formData, property:{...formData.property, tenant: e.target.value}})} onBlur={() => save()} />
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="space-y-8 animate-in slide-in-from-bottom-4">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-3xl font-black italic uppercase">Inventaire</h3>
                                    <button onClick={() => { const d = {...formData, rooms:[...formData.rooms, {id: Date.now(), name:'Nouvelle Pièce', elements:[]}]}; setFormData(d); save(d); }} className="bg-slate-900 text-white w-10 h-10 rounded-xl font-bold text-xl">+</button>
                                </div>
                                {formData.rooms.map(room => (
                                    <div key={room.id} className="bg-slate-50 p-6 rounded-[2rem] space-y-4">
                                        <div className="flex justify-between items-center">
                                            <input className="font-black uppercase bg-transparent w-full outline-none focus:text-emerald-600" value={room.name} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, name: e.target.value} : r)})} onBlur={() => save()} />
                                            <button onClick={() => { if(confirm("Supprimer ?")) { const d = {...formData, rooms: formData.rooms.filter(r => r.id !== room.id)}; setFormData(d); save(d); }}} className="text-slate-300">×</button>
                                        </div>
                                        <div className="space-y-3">
                                            {room.elements.map(el => (
                                                <div key={el.id} className="bg-white p-5 rounded-3xl shadow-sm space-y-4">
                                                    <div className="flex justify-between items-center">
                                                        <input className="font-bold text-xs uppercase text-slate-400 outline-none" value={el.label} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(item => item.id === el.id ? {...item, label: e.target.value} : item)} : r)})} onBlur={() => save()} />
                                                        <button onClick={() => { setActiveEl(el.id); fileInput.current.click(); }} className="text-slate-300 hover:text-slate-900 transition-colors">📸</button>
                                                    </div>
                                                    <div className="flex gap-1.5">
                                                        {['N','B','M','X'].map(s => (
                                                            <button key={s} onClick={() => { const d = {...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(item => item.id === el.id ? {...item, status: s} : item)} : r)}; setFormData(d); save(d); }} 
                                                            className={`flex-1 py-2 rounded-xl text-[10px] font-black transition-all ${el.status === s ? 'bg-slate-900 text-white shadow-lg' : 'bg-slate-100 text-slate-300'}`}>
                                                                {s === 'N' ? 'NEUF' : s === 'B' ? 'BON' : s === 'M' ? 'MOYEN' : 'DÉGR.'}
                                                            </button>
                                                        ))}
                                                    </div>
                                                    {el.photos?.length > 0 && (
                                                        <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                                                            {el.photos.map((ph, idx) => (
                                                                <img key={idx} src={ph} onClick={() => setPreview(ph)} className="w-14 h-14 object-cover rounded-xl border shadow-sm flex-shrink-0" />
                                                            ))}
                                                        </div>
                                                    )}
                                                    <input className="w-full text-[10px] italic text-slate-400 bg-transparent outline-none" placeholder="Observations..." value={el.comment} onChange={e => setFormData({...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: r.elements.map(item => item.id === el.id ? {...item, comment: e.target.value} : item)} : r)})} onBlur={() => save()} />
                                                </div>
                                            ))}
                                            <button onClick={() => { const d = {...formData, rooms: formData.rooms.map(r => r.id === room.id ? {...r, elements: [...r.elements, {id: Date.now(), label:'Nouvel élément', status:'B', comment:'', photos:[]}]} : r)}; setFormData(d); save(d); }} className="w-full py-3 border-2 border-dashed border-slate-200 rounded-2xl text-[10px] font-bold text-slate-300 uppercase">+ Ajouter</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {step === 3 && (
                            <div className="space-y-8 animate-in slide-in-from-bottom-4">
                                <h3 className="text-3xl font-black italic uppercase">Signatures</h3>
                                <SignaturePad label="Le Bailleur" savedImage={formData.signatures.owner} onSave={img => { const d = {...formData, signatures:{...formData.signatures, owner:img}}; setFormData(d); save(d); }} />
                                <SignaturePad label="Le Locataire" savedImage={formData.signatures.tenant} onSave={img => { const d = {...formData, signatures:{...formData.signatures, tenant:img}}; setFormData(d); save(d); }} />
                                <div className="p-6 bg-slate-900 text-white/70 rounded-[2rem] text-[10px] font-bold uppercase tracking-widest leading-relaxed">
                                    En validant, les parties certifient l'exactitude des constatations.
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-6 inset-x-6 no-print">
                        <div className="max-w-xl mx-auto flex gap-3">
                            {step > 1 && <button onClick={() => setStep(step - 1)} className="bg-white border w-14 h-14 rounded-full flex items-center justify-center font-bold shadow-xl text-slate-300">←</button>}
                            <button onClick={() => step < 3 ? setStep(step + 1) : window.print()} className="flex-1 bg-slate-900 text-white rounded-[1.5rem] font-black uppercase text-[10px] tracking-widest h-14 shadow-2xl">
                                {step === 3 ? 'Finaliser' : 'Suivant'}
                            </button>
                        </div>
                    </footer>

                    {/* MODAL PHOTO */}
                    {preview && (
                        <div className="fixed inset-0 bg-black/90 z-[9999] flex items-center justify-center p-4" onClick={() => setPreview(null)}>
                            <img src={preview} className="max-w-full max-h-full rounded-2xl" />
                        </div>
                    )}

                    {/* RENDU IMPRESSION */}
                    <div className="print-only p-8 bg-white text-black">
                        <div className="border-b-4 border-black pb-4 mb-8">
                            <h1 className="text-3xl font-black uppercase italic">Immo-Alex's</h1>
                            <p className="text-[10px] font-bold uppercase">État des Lieux Contradictoire</p>
                            <p className="mt-2 text-sm font-bold">DATE: {formData.property.date}</p>
                        </div>
                        <div className="grid grid-cols-2 gap-8 mb-8">
                            <div className="space-y-1">
                                <p className="text-[8px] font-black text-slate-400 uppercase">Adresse du bien</p>
                                <p className="font-bold text-lg uppercase">{formData.property.address}</p>
                            </div>
                            <div className="space-y-4">
                                <div><p className="text-[8px] font-black text-slate-400 uppercase">Bailleur</p><p className="font-bold uppercase">{formData.property.owner}</p></div>
                                <div><p className="text-[8px] font-black text-slate-400 uppercase">Locataire</p><p className="font-bold uppercase">{formData.property.tenant}</p></div>
                            </div>
                        </div>
                        {formData.rooms.map(r => (
                            <div key={r.id} className="mb-6 break-inside-avoid">
                                <h3 className="font-black uppercase bg-slate-100 p-2 text-[10px] mb-2">{r.name}</h3>
                                {r.elements.map(el => (
                                    <div key={el.id} className="border-b border-slate-100 py-3 flex gap-4">
                                        <div className="flex-1">
                                            <p className="font-bold uppercase text-[9px]">{el.label} • {el.status}</p>
                                            <p className="text-[9px] italic text-slate-500">{el.comment || 'Néant'}</p>
                                            <div className="flex gap-1 mt-2">
                                                {el.photos?.map((ph, idx) => (
                                                    <img key={idx} src={ph} className="h-16 w-16 object-cover rounded border" />
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ))}
                        <div className="mt-12 grid grid-cols-2 gap-12 border-t-2 border-black pt-8">
                            <div className="text-center">
                                <p className="text-[8px] font-black uppercase mb-4">Signature Bailleur</p>
                                {formData.signatures.owner && <img src={formData.signatures.owner} className="h-24 mx-auto" />}
                            </div>
                            <div className="text-center">
                                <p className="text-[8px] font-black uppercase mb-4">Signature Locataire</p>
                                {formData.signatures.tenant && <img src={formData.signatures.tenant} className="h-24 mx-auto" />}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
